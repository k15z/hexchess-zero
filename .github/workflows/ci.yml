name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # Match release.yml: lint the whole workspace so PRs catch binding-crate
      # lints that wouldn't show up when only the engine is checked.
      - run: cargo clippy --workspace -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p hexchess-engine

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@wasm-pack
      - run: wasm-pack build --target web bindings/wasm
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: bindings/wasm/pkg/

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --group dev
      - run: uv run pytest

  # Build each platform natively in parallel (no QEMU emulation)
  docker-build:
    name: Build ${{ matrix.variant }}-${{ matrix.arch }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rust-test, python-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            arch: amd64
            runner: ubuntu-24.04
          - variant: cpu
            arch: arm64
            runner: ubuntu-24.04-arm
          - variant: cuda
            arch: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/k15z/hexchess-zero/training
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: TORCH_VARIANT=${{ matrix.variant == 'cuda' && 'cu121' || 'cpu' }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }},mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.variant }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.variant }}/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.variant }}
          if-no-files-found: error
          retention-days: 1

  # Merge per-arch images into multi-arch manifests
  docker-publish:
    name: Publish ${{ matrix.variant }} manifest
    needs: docker-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: cpu
            tags: |
              ghcr.io/k15z/hexchess-zero/training:latest
              ghcr.io/k15z/hexchess-zero/training:cpu
              ghcr.io/k15z/hexchess-zero/training:sha-${{ github.sha }}
          - variant: cuda
            tags: |
              ghcr.io/k15z/hexchess-zero/training:cuda
              ghcr.io/k15z/hexchess-zero/training:cu121
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/k15z/hexchess-zero/training
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.variant }}-*
          path: /tmp/digests/${{ matrix.variant }}
          merge-multiple: true
      - name: Create manifest and push
        working-directory: /tmp/digests/${{ matrix.variant }}
        run: |
          TAGS=$(echo '${{ matrix.tags }}' | xargs -n1 printf ' -t %s')
          DIGESTS=$(printf '${{ env.IMAGE }}@sha256:%s ' *)
          docker buildx imagetools create $TAGS $DIGESTS
