name: Docker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Let the running build finish; only the latest queued build survives.
# When commits A, B, C land quickly: CI cancels A and B (cancel-in-progress
# in ci.yml), only C's CI completes and triggers this workflow. If a Docker
# build is already running when a new CI completes, the new run queues —
# and any further triggers replace that queued run rather than stacking up.
concurrency:
  group: docker
  cancel-in-progress: false

jobs:
  # Build each platform natively in parallel (no QEMU emulation)
  build:
    name: Build ${{ matrix.variant }}-${{ matrix.arch }}
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            arch: amd64
            runner: ubuntu-24.04
          - variant: cpu
            arch: arm64
            runner: ubuntu-24.04-arm
          - variant: cuda
            arch: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/k15z/hexchess-zero/training
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: TORCH_VARIANT=${{ matrix.variant == 'cuda' && 'cu121' || 'cpu' }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }},mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.variant }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.variant }}/${digest#sha256:}"
      - uses: actions/upload-artifact@v5
        with:
          name: digest-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.variant }}
          if-no-files-found: error
          retention-days: 1

  # Merge per-arch images into multi-arch manifests
  publish:
    name: Publish ${{ matrix.variant }} manifest
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [cpu, cuda]
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/k15z/hexchess-zero/training
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v5
        with:
          pattern: digest-${{ matrix.variant }}-*
          path: /tmp/digests/${{ matrix.variant }}
          merge-multiple: true
      - name: Create manifest and push
        working-directory: /tmp/digests/${{ matrix.variant }}
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAGS="-t ${{ env.IMAGE }}:${{ matrix.variant }} -t ${{ env.IMAGE }}:${{ matrix.variant }}-${SHORT_SHA}"
          DIGESTS=$(printf '${{ env.IMAGE }}@sha256:%s ' *)
          docker buildx imagetools create $TAGS $DIGESTS
