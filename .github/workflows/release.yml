name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        required: true
        options: [patch, minor, major]
      dry_run:
        description: 'Dry run: build everything, skip publish + tag'
        type: boolean
        required: false
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
      staging_ref: ${{ steps.bump.outputs.staging_ref }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-edit
        run: cargo install cargo-edit --locked
      - name: Run tests
        run: cargo test --workspace
      - name: Lint
        run: cargo clippy --workspace -- -D warnings && cargo fmt --all -- --check
      - name: Compute next version and stage release commit
        id: bump
        run: |
          set -euo pipefail
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#v}"
          fi
          echo "Current released version: $CURRENT"

          # Bump Cargo.toml in-place on the runner (never committed to main).
          cargo set-version --workspace "$CURRENT"
          cargo set-version --workspace --bump "${{ inputs.bump }}"
          NEW=$(cargo pkgid -p hexchess-engine | sed -E 's/.*[#@]([0-9]+\.[0-9]+\.[0-9]+)$/\1/')
          echo "New version: $NEW"

          cargo update -w

          # Stage the bump on a temporary branch. The tag is only created after
          # publish succeeds, so failed releases don't burn version numbers.
          STAGING="release-staging/v$NEW"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$STAGING"
          git add -A
          git commit -m "Release v$NEW"
          git push -f origin "$STAGING"

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "staging_ref=$STAGING" >> "$GITHUB_OUTPUT"

  build-wheels:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux wheels: bindings/python/Cargo.toml turns on `openssl/vendored`
          # for cfg(target_os = "linux"), so openssl-sys builds OpenSSL from
          # source. Both targets need a perl with Time::Piece + IPC::Cmd +
          # FindBin to run OpenSSL's Configure script.
          #
          # x86_64: container is manylinux_2_28 (AlmaLinux/dnf).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_28'
            before_script_linux: 'dnf install -y perl-IPC-Cmd perl-Time-Piece perl-FindBin perl-File-Compare perl-File-Copy'
          # aarch64: container is ghcr.io/rust-cross/manylinux_2_28-cross:aarch64
          # (Debian-based, apt). Modern Debian perl bundles Time::Piece, but we
          # still need IPC::Cmd, plus make for openssl's build system.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: '2_28'
            before_script_linux: 'apt-get update && apt-get install -y perl libipc-cmd-perl libtime-piece-perl make'
          # macOS arm64 (Apple Silicon). We intentionally do not build an
          # x86_64 macOS wheel: the macos-13 runner image has been retired,
          # and macOS 13 Intel users can install via the sdist.
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.staging_ref }}
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: ${{ matrix.before_script_linux }}
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/dist

  build-sdist:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.staging_ref }}
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: bindings/python/dist

  build-wasm:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.staging_ref }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm package
        run: wasm-pack build bindings/wasm --target web --release
      - name: Rename npm package to hexchess-zero
        run: |
          cd bindings/wasm/pkg
          node -e "const f='package.json';const p=require('./'+f);p.name='hexchess-zero';require('fs').writeFileSync(f,JSON.stringify(p,null,2))"
          cat package.json
      - uses: actions/upload-artifact@v5
        with:
          name: wasm-pkg
          path: bindings/wasm/pkg

  publish-pypi:
    if: ${{ !inputs.dry_run }}
    needs: [validate, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist
      - name: Check if version already on PyPI
        id: check
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if curl -sf -o /dev/null "https://pypi.org/pypi/hexchess-zero/$VERSION/json"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::hexchess-zero==$VERSION already on PyPI, skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.already_published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    if: ${{ !inputs.dry_run }}
    needs: [validate, build-wasm]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: wasm-pkg
          path: pkg
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already on npm
        id: check
        working-directory: pkg
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if npm view "hexchess-zero@$VERSION" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::hexchess-zero@$VERSION already on npm, skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.check.outputs.already_published != 'true'
        working-directory: pkg
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  finalize:
    if: ${{ !inputs.dry_run }}
    needs: [validate, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          SHA: ${{ needs.validate.outputs.sha }}
          STAGING: ${{ needs.validate.outputs.staging_ref }}
        run: |
          set -euo pipefail
          # Create the annotated tag via the GitHub API, pointing at the staged
          # commit. This runs only after PyPI and npm publish have succeeded.
          gh api "repos/$REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          gh release create "$TAG" --generate-notes --target "$SHA"
          # Clean up the staging branch.
          gh api -X DELETE "repos/$REPO/git/refs/heads/$STAGING" || true

  cleanup-on-failure:
    needs: [validate, build-wheels, build-sdist, build-wasm, publish-pypi, publish-npm, finalize]
    if: failure() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Delete staging branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STAGING: ${{ needs.validate.outputs.staging_ref }}
        run: gh api -X DELETE "repos/$REPO/git/refs/heads/$STAGING" || true

  cleanup-dry-run:
    # Dry runs skip finalize (which owns the branch-cleanup), so tidy up here.
    needs: [validate, build-wheels, build-sdist, build-wasm]
    if: ${{ inputs.dry_run && needs.validate.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete staging branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          STAGING: ${{ needs.validate.outputs.staging_ref }}
        run: gh api -X DELETE "repos/$REPO/git/refs/heads/$STAGING" || true
