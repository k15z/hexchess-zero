name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        required: true
        options: [patch, minor, major]
      dry_run:
        description: 'Dry run: build everything, skip publish + tag'
        type: boolean
        required: false
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

# We do NOT push a "staging branch" with the version bump committed:
# GITHUB_TOKEN refuses to push branches that include workflow file commits
# (a hard GitHub restriction; would require a PAT with `workflows:write`).
# Instead, the version bump is applied in-place inside each build job, and
# the git tag at the end points at main HEAD. The version only exists in
# the published artifacts — not in any tracked git history.

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
      - name: Lint
        run: cargo clippy --workspace -- -D warnings && cargo fmt --all -- --check
      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#v}"
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "Current released version: $CURRENT"
          echo "New version: $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-wheels:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux wheels need openssl for ort-sys's build.rs (it pulls
          # openssl-sys via ureq → native-tls to download onnxruntime).
          # The two cross containers maturin-action picks have different
          # package managers — see PyO3/maturin-action#192 for the canonical
          # pattern this is based on.
          #
          # x86_64: ghcr.io/rust-cross/manylinux_2_28-cross:x86_64 (AlmaLinux/dnf).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_28'
            before_script_linux: 'dnf install -y openssl-devel perl-IPC-Cmd'
          # aarch64: ghcr.io/rust-cross/manylinux_2_28-cross:aarch64 (Debian/apt).
          # libssl-dev installs the aarch64 cross sysroot openssl in this image.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: '2_28'
            before_script_linux: 'apt-get update && apt-get install -y pkg-config libssl-dev'
          # macOS arm64 (Apple Silicon). We intentionally do not build an
          # x86_64 macOS wheel: the macos-13 runner image has been retired,
          # and macOS 13 Intel users can install via the sdist.
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Bump workspace version
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: python3 .github/workflows/_set_workspace_version.py
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: ${{ matrix.before_script_linux }}
          args: --release --out dist
          sccache: 'true'
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/dist

  build-sdist:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bump workspace version
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: python3 .github/workflows/_set_workspace_version.py
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: bindings/python/dist

  build-wasm:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Bump workspace version
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: python3 .github/workflows/_set_workspace_version.py
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm package
        run: wasm-pack build bindings/wasm --target web --release
      - name: Rename npm package to hexchess-zero
        run: |
          cd bindings/wasm/pkg
          node -e "const f='package.json';const p=require('./'+f);p.name='hexchess-zero';require('fs').writeFileSync(f,JSON.stringify(p,null,2))"
          cat package.json
      - uses: actions/upload-artifact@v5
        with:
          name: wasm-pkg
          path: bindings/wasm/pkg

  publish-pypi:
    if: ${{ !inputs.dry_run }}
    needs: [validate, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist
      - name: Check if version already on PyPI
        id: check
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if curl -sf -o /dev/null "https://pypi.org/pypi/hexchess-zero/$VERSION/json"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::hexchess-zero==$VERSION already on PyPI, skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.already_published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    if: ${{ !inputs.dry_run }}
    needs: [validate, build-wasm]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: wasm-pkg
          path: pkg
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already on npm
        id: check
        working-directory: pkg
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if npm view "hexchess-zero@$VERSION" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::hexchess-zero@$VERSION already on npm, skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.check.outputs.already_published != 'true'
        working-directory: pkg
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  finalize:
    if: ${{ !inputs.dry_run }}
    needs: [validate, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          SHA: ${{ needs.validate.outputs.sha }}
        run: |
          set -euo pipefail
          # Tag main HEAD (the SHA validate ran against) only after PyPI and
          # npm publish have succeeded — failed releases don't burn version
          # numbers.
          gh api "repos/$REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          gh release create "$TAG" --generate-notes --target "$SHA"
