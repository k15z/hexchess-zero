name: Cleanup Old Docker Images

on:
  schedule:
    # Run weekly on Sunday at 3am UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: list images to delete without deleting'
        type: boolean
        default: false

permissions:
  packages: write

env:
  # Tags to keep (never delete these)
  KEEP_TAGS: 'latest cpu cuda cu121'
  # Keep images newer than this many days
  KEEP_DAYS: 30
  # Always keep at least this many sha-* versions
  MIN_KEEP: 5

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old container versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          PACKAGE="hexchess-zero/training"
          OWNER="${{ github.repository_owner }}"
          CUTOFF_DATE=$(date -d "-${KEEP_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)

          echo "Package: $PACKAGE"
          echo "Owner: $OWNER"
          echo "Cutoff date: $CUTOFF_DATE"
          echo "Keep tags: $KEEP_TAGS"
          echo "Dry run: ${DRY_RUN:-false}"
          echo

          # Fetch all versions of the container package, sorted newest first
          # Note: --paginate outputs one JSON array per page, so we collect with -s and flatten
          VERSIONS=$(gh api --paginate \
            "/users/$OWNER/packages/container/${PACKAGE//\//%2F}/versions" | \
            jq -s 'add | sort_by(.created_at) | reverse | .[] | {id: .id, created_at: .created_at, tags: .metadata.container.tags}')

          # Track how many sha-* versions we've kept
          SHA_KEPT=0
          TO_DELETE=()

          while IFS= read -r version; do
            [ -z "$version" ] && continue

            ID=$(echo "$version" | jq -r '.id')
            CREATED=$(echo "$version" | jq -r '.created_at')
            TAGS=$(echo "$version" | jq -r '.tags // [] | join(" ")')

            # Check if any tag is in our keep list
            SHOULD_KEEP=false
            for tag in $TAGS; do
              for keep in $KEEP_TAGS; do
                if [ "$tag" = "$keep" ]; then
                  SHOULD_KEEP=true
                  echo "Keeping version $ID (tag: $tag)"
                  break 2
                fi
              done
            done

            if [ "$SHOULD_KEEP" = "true" ]; then
              continue
            fi

            # Check if it's a sha-* tag and within retention
            IS_SHA=false
            for tag in $TAGS; do
              if [[ "$tag" == sha-* ]]; then
                IS_SHA=true
                break
              fi
            done

            # Keep recent sha-* versions up to MIN_KEEP
            if [ "$IS_SHA" = "true" ] && [ "$SHA_KEPT" -lt "$MIN_KEEP" ]; then
              echo "Keeping version $ID (sha tag, min-keep: $((SHA_KEPT + 1))/$MIN_KEEP)"
              SHA_KEPT=$((SHA_KEPT + 1))
              continue
            fi

            # Keep versions newer than cutoff
            if [[ "$CREATED" > "$CUTOFF_DATE" ]]; then
              echo "Keeping version $ID (created: $CREATED, within retention)"
              [ "$IS_SHA" = "true" ] && SHA_KEPT=$((SHA_KEPT + 1))
              continue
            fi

            # Mark for deletion
            echo "Will delete version $ID (tags: ${TAGS:-untagged}, created: $CREATED)"
            TO_DELETE+=("$ID")
          done <<< "$VERSIONS"

          echo
          echo "Summary: ${#TO_DELETE[@]} versions to delete"

          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "Dry run - no deletions performed"
            exit 0
          fi

          for id in "${TO_DELETE[@]}"; do
            echo "Deleting version $id..."
            gh api --method DELETE \
              "/users/$OWNER/packages/container/${PACKAGE//\//%2F}/versions/$id" \
              || echo "Failed to delete $id (may already be deleted)"
          done

          echo "Cleanup complete"
