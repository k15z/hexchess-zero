<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hexchess training</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    background: #0d1117; color: #c9d1d9;
    font-size: 13px; line-height: 1.5;
    max-width: 640px; margin: 0 auto;
    padding: 8px;
  }
  h2 { font-size: 14px; color: #58a6ff; margin: 16px 0 6px 0; text-transform: uppercase; letter-spacing: 1px; }
  .header {
    position: sticky; top: 0; z-index: 10;
    background: #0d1117; border-bottom: 1px solid #21262d;
    padding: 8px 0; margin-bottom: 8px;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .model-ver { font-size: 18px; font-weight: bold; color: #f0f6fc; }
  .kv { display: flex; justify-content: space-between; padding: 2px 0; }
  .kv .k { color: #8b949e; }
  .kv .v { color: #f0f6fc; }
  table { width: 100%; border-collapse: collapse; margin: 4px 0; }
  th { text-align: left; color: #8b949e; font-weight: normal; border-bottom: 1px solid #21262d; padding: 3px 6px; }
  td { padding: 3px 6px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .empty { color: #484f58; font-style: italic; padding: 8px 0; }
  .section { margin-bottom: 8px; }
  .section summary { cursor: pointer; }
  .section[open] summary { margin-bottom: 6px; }
  .elo-bar { display: inline-block; height: 10px; background: #1f6feb; border-radius: 2px; }
  .elo-neg .elo-bar { background: #f85149; }
  .worker-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .worker-dot.fresh { background: #3fb950; }
  .worker-dot.stale { background: #d29922; }
  .worker-dot.dead { background: #f85149; }
  .last-refresh { font-size: 11px; color: #484f58; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span class="model-ver" id="model-ver">—</span>
    <span class="last-refresh" id="last-refresh"></span>
  </div>
  <div id="promoted-at" style="font-size:11px;color:#8b949e"></div>
</div>

<details class="section" open>
  <summary><h2>Workers</h2></summary>
  <div id="workers-content" class="empty">Loading...</div>
</details>

<details class="section" open>
  <summary><h2>Elo Ratings</h2></summary>
  <div id="elo-content" class="empty">Loading...</div>
</details>

<details class="section" open>
  <summary><h2>Data</h2></summary>
  <div id="data-content" class="empty">Loading...</div>
</details>

<script>
const REFRESH_MS = 15000;

function ago(ts) {
  if (!ts) return '';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function fmt(n, d) {
  if (n == null) return '—';
  return typeof n === 'number' ? n.toLocaleString(undefined, {maximumFractionDigits: d || 0}) : n;
}

function workerFreshness(ts) {
  if (!ts) return 'dead';
  const age = (Date.now() - new Date(ts).getTime()) / 1000;
  if (age < 120) return 'fresh';
  if (age < 600) return 'stale';
  return 'dead';
}

function renderHeader(data) {
  const m = data.model;
  document.getElementById('model-ver').textContent = m.version ? `v${m.version}` : 'no model';
  document.getElementById('promoted-at').textContent = m.promoted_at ? `promoted ${ago(m.promoted_at)}` : 'bootstrap pending';
  document.getElementById('last-refresh').textContent = `updated ${ago(data.timestamp)}`;
}

function renderWorkers(data) {
  const w = data.workers || {};
  const el = document.getElementById('workers-content');
  const names = Object.keys(w);

  if (!names.length) {
    el.className = 'empty';
    el.textContent = 'No worker heartbeats';
    return;
  }

  let html = `<table><tr><th></th><th>worker</th><th>model</th><th>games</th><th>positions</th><th>last seen</th></tr>`;
  for (const name of names.sort()) {
    const hb = w[name];
    const cls = workerFreshness(hb.timestamp);
    html += `<tr>
      <td><span class="worker-dot ${cls}"></span></td>
      <td>${name}</td>
      <td>v${hb.model_version || '?'}</td>
      <td class="num">${fmt(hb.total_games)}</td>
      <td class="num">${fmt(hb.total_positions)}</td>
      <td class="num">${ago(hb.timestamp)}</td>
    </tr>`;
  }
  html += '</table>';
  el.className = '';
  el.innerHTML = html;
}

function renderElo(data) {
  const e = data.elo;
  const el = document.getElementById('elo-content');

  if (!Object.keys(e.ratings).length) {
    el.className = 'empty';
    el.textContent = `No Elo ratings yet (${e.total_games} games played)`;
    return;
  }

  const sorted = Object.entries(e.ratings).sort((a, b) => b[1] - a[1]);
  const maxR = Math.max(...sorted.map(s => Math.abs(s[1])), 1);

  const ps = e.player_stats || {};
  let html = `<div class="kv"><span class="k">games</span><span class="v">${fmt(e.total_games)}</span></div>`;
  html += `<table><tr><th>#</th><th>player</th><th>elo</th><th>s/move</th><th></th></tr>`;

  for (let i = 0; i < sorted.length; i++) {
    const [name, rating] = sorted[i];
    const barW = Math.max(2, Math.round(Math.abs(rating) / maxR * 120));
    const neg = rating < 0 ? 'elo-neg' : '';
    const st = ps[name];
    const avgMove = st && st.total_moves > 0 ? (st.total_time / st.total_moves).toFixed(2) : '—';
    html += `<tr>
      <td class="num">${i + 1}</td>
      <td>${name}</td>
      <td class="num">${rating > 0 ? '+' : ''}${rating}</td>
      <td class="num">${avgMove}</td>
      <td class="${neg}"><span class="elo-bar" style="width:${barW}px"></span></td>
    </tr>`;
  }
  html += '</table>';

  el.className = '';
  el.innerHTML = html;
}

function renderData(data) {
  const d = data.data;
  const el = document.getElementById('data-content');

  let html = '';

  // Self-play data
  const sp = d.selfplay;
  html += `<div class="kv"><span class="k">self-play</span><span class="v">${fmt(sp.total_files)} files, ${fmt(sp.total_positions)} positions</span></div>`;

  if (Object.keys(sp.by_version || {}).length) {
    html += `<table><tr><th>version</th><th>files</th><th>positions</th></tr>`;
    for (const [ver, info] of Object.entries(sp.by_version)) {
      html += `<tr><td>${ver}</td><td class="num">${info.count}</td><td class="num">${fmt(info.positions)}</td></tr>`;
    }
    html += '</table>';
  }

  // Imitation data
  const im = d.imitation;
  html += `<div class="kv"><span class="k">imitation</span><span class="v">${fmt(im.total_files)} files, ${fmt(im.total_positions)} positions</span></div>`;

  // Model snapshots
  if (d.models.length) {
    html += `<div class="kv"><span class="k">model snapshots</span><span class="v">${d.models.length} versions</span></div>`;
  }

  el.className = '';
  el.innerHTML = html || '<span class="empty">No data yet</span>';
}

async function refresh() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    renderHeader(data);
    renderWorkers(data);
    renderElo(data);
    renderData(data);
  } catch (e) {
    document.getElementById('last-refresh').textContent = `error: ${e.message}`;
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
