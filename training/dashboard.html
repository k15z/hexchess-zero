<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hexchess training</title>
<link rel="icon" type="image/png" href="/icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg-deep: #07080b;
    --bg-base: #0d1015;
    --bg-raised: #141923;
    --bg-surface: #191f2a;
    --bg-overlay: rgba(12, 16, 23, 0.82);
    --border-dim: rgba(160, 175, 198, 0.08);
    --border-mid: rgba(184, 196, 214, 0.16);
    --border-strong: rgba(225, 182, 90, 0.28);
    --text-primary: #edf1f7;
    --text-secondary: #b2bdcc;
    --text-dim: #6d7889;
    --accent: #e1b65a;
    --accent-soft: rgba(225, 182, 90, 0.14);
    --accent-dim: #8e7850;
    --green: #42c78b;
    --amber: #f0be64;
    --red: #f07178;
    --teal: #5cc7c6;
    --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.22);
    --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    --sans: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg-deep);
    color: var(--text-primary);
    font-size: 12px;
    line-height: 1.5;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at top left, rgba(92, 199, 198, 0.12), transparent 32%),
      radial-gradient(circle at top right, rgba(225, 182, 90, 0.14), transparent 28%),
      linear-gradient(180deg, #0b0d12 0%, #07080b 55%, #06070a 100%);
  }

  .container {
    position: relative;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 20px 56px;
  }

  /* --- Header --- */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, rgba(7, 8, 11, 0.96), rgba(7, 8, 11, 0.8));
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-dim);
    padding: 18px 0 16px;
    margin-bottom: 18px;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }

  .header-left {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .brand-lockup {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo {
    font-family: var(--sans);
    font-size: 30px;
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -1.4px;
    color: var(--text-primary);
  }

  .logo span { color: var(--accent); font-weight: 500; }

  .header-subtitle {
    max-width: 420px;
    color: var(--text-secondary);
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .model-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(180deg, rgba(225, 182, 90, 0.18), rgba(225, 182, 90, 0.08));
    border: 1px solid var(--border-strong);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }

  .header-meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 11px;
    color: var(--text-secondary);
    text-align: right;
  }

  .header-meta strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .overview {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 22px;
  }

  .snapshot {
    position: relative;
    min-height: 88px;
    padding: 14px 16px;
    border: 1px solid var(--border-dim);
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
      var(--bg-overlay);
    box-shadow: var(--shadow-soft);
    overflow: hidden;
  }

  .snapshot::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 2px;
    background: linear-gradient(180deg, rgba(92, 199, 198, 0.15), rgba(225, 182, 90, 0.9));
  }

  .snapshot-label {
    display: block;
    margin-bottom: 14px;
    color: var(--text-dim);
    font-size: 10px;
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .snapshot-value {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-family: var(--sans);
    font-size: 28px;
    line-height: 0.95;
    letter-spacing: -0.06em;
    font-weight: 700;
    color: var(--text-primary);
  }

  .snapshot-meta {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 11px;
  }

  .snapshot-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    font-size: 11px;
  }

  .snapshot-status .dot {
    margin-right: 0;
  }

  /* --- Section panels --- */
  .panel {
    position: relative;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0)),
      rgba(13, 16, 21, 0.88);
    border: 1px solid var(--border-dim);
    border-radius: 20px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-soft);
  }

  .panel::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 1px;
    background: linear-gradient(180deg, rgba(92, 199, 198, 0), rgba(225, 182, 90, 0.5), rgba(92, 199, 198, 0));
    opacity: 0.9;
  }

  .panel-header {
    appearance: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 14px 16px 13px;
    background: linear-gradient(180deg, rgba(25, 31, 42, 0.72), rgba(20, 25, 35, 0.36));
    border: 0;
    border-bottom: 1px solid var(--border-dim);
    cursor: pointer;
    user-select: none;
    transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    text-align: left;
    color: inherit;
    font: inherit;
  }

  .panel-header:hover {
    background: linear-gradient(180deg, rgba(30, 37, 48, 0.86), rgba(22, 29, 40, 0.55));
  }

  .panel-header:focus-visible {
    outline: none;
    box-shadow: inset 0 0 0 1px rgba(225, 182, 90, 0.55);
  }

  .panel-header > * { pointer-events: none; }

  .panel-title {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-secondary);
  }

  .panel-badge {
    font-size: 10px;
    color: var(--accent);
    font-weight: 600;
    padding: 3px 8px;
    background: var(--accent-soft);
    border-radius: 999px;
    border: 1px solid rgba(225, 182, 90, 0.18);
  }

  .panel-chevron {
    color: var(--accent);
    font-size: 10px;
    transition: transform 0.22s ease;
  }

  .panel.collapsed .panel-chevron { transform: rotate(-90deg); }
  .panel.collapsed .panel-body { display: none; }

  .panel-body { padding: 14px 16px 16px; }

  /* --- Two-column grid for bottom panels --- */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .two-col .panel { margin-bottom: 0; }

  @media (max-width: 640px) {
    .two-col { grid-template-columns: 1fr; }
  }

  /* --- Tables --- */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    padding: 6px 8px 8px;
    border-bottom: 1px solid var(--border-dim);
    white-space: nowrap;
  }

  th.r, td.r { text-align: right; }
  th.c, td.c { text-align: center; }

  /* --- Evaluated / provisional badge --- */
  .eval-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .eval-badge.eval {
    color: var(--green);
    border-color: rgba(34, 197, 94, 0.35);
    background: rgba(34, 197, 94, 0.08);
  }
  .eval-badge.prov {
    color: var(--amber);
    border-color: rgba(234, 179, 8, 0.35);
    background: rgba(234, 179, 8, 0.08);
  }

  /* Dim provisional rows, but leave the CI bar cell at full opacity so
     the already-subtle (--rating-bar-ci: opacity 0.2) bar remains legible. */
  tr.provisional td { opacity: 0.55; }
  tr.provisional td:last-child { opacity: 1; }

  td {
    padding: 7px 8px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    border-bottom: 1px solid rgba(160, 175, 198, 0.08);
  }

  tr:last-child td { border-bottom: none; }

  tbody tr:hover td,
  table tr:hover td {
    background: rgba(255, 255, 255, 0.02);
  }

  /* --- Rating bars --- */
  .rating-bar-track {
    flex: 1;
    height: 14px;
    background: rgba(7, 8, 11, 0.75);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    min-width: 60px;
  }

  .rating-bar {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    border-radius: 2px;
    transition: width 0.4s ease;
    min-width: 2px;
  }

  .rating-bar-ci {
    position: absolute;
    top: 2px; bottom: 2px;
    border-radius: 1px;
    opacity: 0.2;
  }

  /* --- Worker dots --- */
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 4px;
  }

  .dot.fresh { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .dot.stale { background: var(--amber); }
  .dot.dead { background: var(--red); }

  /* --- Head-to-head matrix --- */
  .h2h-wrap { overflow-x: auto; }

  .h2h-table th, .h2h-table td {
    text-align: center;
    padding: 3px 4px;
    font-size: 10px;
    min-width: 56px;
  }

  .h2h-table th {
    font-size: 9px;
    max-width: 64px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .h2h-table td.self {
    background: rgba(255, 255, 255, 0.035);
    color: var(--text-dim);
  }

  .h2h-cell {
    border-radius: 2px;
    padding: 2px 4px;
    font-size: 10px;
    font-weight: 500;
  }

  .h2h-cell.dominant { color: var(--green); }
  .h2h-cell.losing { color: var(--red); }
  .h2h-cell.even { color: var(--text-dim); }
  .h2h-cell.none { color: var(--text-dim); opacity: 0.3; }

  /* --- Game log --- */
  .game-outcome {
    font-weight: 600;
    font-size: 11px;
  }

  .game-outcome.w { color: var(--green); }
  .game-outcome.b { color: var(--red); }
  .game-outcome.d { color: var(--text-dim); }

  /* --- KV pairs --- */
  .kv-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 4px 0;
  }

  .kv-row .k { color: var(--text-dim); }
  .kv-row .v { color: var(--text-primary); font-weight: 500; text-align: right; }

  /* --- Misc --- */
  .empty { color: var(--text-dim); font-style: italic; padding: 12px 0; }
  .muted { color: var(--text-dim); }

  /* --- Fade in --- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .initial .panel { animation: fadeUp 0.3s ease both; }
  .initial .panel:nth-child(2) { animation-delay: 0.04s; }
  .initial .panel:nth-child(3) { animation-delay: 0.08s; }
  .initial .panel:nth-child(4) { animation-delay: 0.12s; }
  .initial .two-col .panel { animation: fadeUp 0.3s ease both; animation-delay: 0.16s; }
  .initial .two-col .panel:nth-child(2) { animation-delay: 0.20s; }

  @media (max-width: 960px) {
    .overview { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .header-row,
    .header-left {
      flex-direction: column;
      align-items: flex-start;
    }
    .header-meta { text-align: left; }
  }

  @media (max-width: 640px) {
    body { font-size: 11px; }
    .container { padding: 0 14px 42px; }
    .header { padding-top: 16px; }
    .logo { font-size: 24px; }
    .overview { grid-template-columns: 1fr; }
    .snapshot { min-height: 76px; }
    .snapshot-value { font-size: 24px; }
    .panel-header,
    .panel-body { padding-left: 14px; padding-right: 14px; }
  }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="header-row">
    <div class="header-left">
      <div class="brand-lockup">
        <div class="logo">hexchess <span>training</span></div>
        <div class="header-subtitle">Live model promotion, worker health, replay growth, and evaluation drift in one operating surface.</div>
      </div>
      <span class="model-badge" id="model-badge">&mdash;</span>
    </div>
    <div class="header-meta">
      <div id="promoted-at"></div>
      <div id="last-refresh"></div>
    </div>
  </div>
</div>

<div class="overview" id="overview"></div>
<div id="panels"></div>

</div>

<script>
const REFRESH_MS = 60000;
const CONSERVATIVE_Z = 2.0;
// Sigma posterior tight enough that mu is meaningful. Must match
// EVALUATED_SIGMA_THRESHOLD in training/elo.py.
const EVALUATED_SIGMA_THRESHOLD = 2.5;
const BASELINES = new Set(['Minimax-2', 'Minimax-3', 'Minimax-4', 'Heuristic']);

function conservRating(mu, sigma) { return mu - CONSERVATIVE_Z * sigma; }
function isEvaluated(sigma) { return sigma <= EVALUATED_SIGMA_THRESHOLD; }

function ago(ts) {
  if (!ts) return '';
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  if (s < 0) return 'just now';
  if (s < 60) return Math.floor(s) + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function fmt(n) {
  if (n == null) return '\u2014';
  return typeof n === 'number' ? n.toLocaleString() : n;
}

function freshness(ts) {
  if (!ts) return 'dead';
  const age = (Date.now() - new Date(ts).getTime()) / 1000;
  if (age < 120) return 'fresh';
  if (age < 600) return 'stale';
  return 'dead';
}

function pairKey(a, b) { return [a, b].sort().join(':'); }
function shorten(s) { return s.length > 7 ? s.slice(0, 6) + '\u2026' : s; }

// --- Panel collapse state ---
const panelState = {};
const panelDefaults = {};
function togglePanel(id) {
  const defaultOpen = panelDefaults[id] !== undefined ? panelDefaults[id] : true;
  const currentCollapsed = panelState[id] !== undefined ? panelState[id] : !defaultOpen;
  panelState[id] = !currentCollapsed;
  render(lastData);
}

let lastData = null;
let firstRender = true;

// --- Render helpers ---
function panelHtml(id, title, badge, body, defaultOpen = true) {
  panelDefaults[id] = defaultOpen;
  const collapsed = panelState[id] !== undefined ? panelState[id] : !defaultOpen;
  return `<div class="panel ${collapsed ? 'collapsed' : ''}" id="panel-${id}">
    <button type="button" class="panel-header" onclick="togglePanel('${id}')" aria-expanded="${collapsed ? 'false' : 'true'}">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="panel-title">${title}</span>
        ${badge ? `<span class="panel-badge">${badge}</span>` : ''}
      </div>
      <span class="panel-chevron">&#9660;</span>
    </button>
    <div class="panel-body">${body}</div>
  </div>`;
}

function renderRatingTable(players, ratings, playerStats) {
  if (!players.length) return '';

  const items = players
    .filter(n => ratings[n])
    .map(n => {
      const r = ratings[n];
      return {
        name: n,
        mu: r.mu,
        sigma: r.sigma,
        cr: conservRating(r.mu, r.sigma),
        evaluated: isEvaluated(r.sigma),
      };
    })
    .sort((a, b) => b.cr - a.cr);

  if (!items.length) return '';

  // Bar is centered on `cr` so the tick aligns with the "rating" column.
  const minCr = Math.min(...items.map(i => i.cr - i.sigma));
  const maxCr = Math.max(...items.map(i => i.cr + i.sigma));
  const range = Math.max(maxCr - minCr, 1);
  const base = minCr - range * 0.05;
  const span = range * 1.1;

  let html = '<table><tr><th style="width:24px">#</th><th>player</th><th class="r">rating</th><th class="r" style="width:56px">\u03bc</th><th class="r" style="width:48px">\u00b1\u03c3</th><th class="c" style="width:52px">state</th><th class="r" style="width:52px">s/mv</th><th style="min-width:100px"></th></tr>';

  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    const ps = playerStats[it.name];
    const avg = ps && ps.total_moves > 0 ? (ps.total_time / ps.total_moves).toFixed(2) : '\u2014';

    const barLeft = Math.max(0, ((it.cr - it.sigma) - base) / span * 100);
    const barRight = Math.min(100, ((it.cr + it.sigma) - base) / span * 100);
    const barCenter = (it.cr - base) / span * 100;

    const isBaseline = BASELINES.has(it.name);
    const barColor = isBaseline ? 'var(--accent-dim)' : 'var(--accent)';
    const rowClass = it.evaluated ? '' : 'provisional';
    const stateBadge = it.evaluated
      ? `<span class="eval-badge eval" title="sigma \u2264 ${EVALUATED_SIGMA_THRESHOLD} — posterior tight, mu meaningful">eval</span>`
      : `<span class="eval-badge prov" title="sigma > ${EVALUATED_SIGMA_THRESHOLD} — provisional, mu not yet trustworthy">prov</span>`;

    html += `<tr class="${rowClass}">
      <td class="r muted">${i + 1}</td>
      <td style="${isBaseline ? 'color:var(--text-dim)' : ''}">${it.name}</td>
      <td class="r" style="font-weight:600">${it.cr >= 0 ? '+' : ''}${it.cr.toFixed(2)}</td>
      <td class="r muted">${it.mu.toFixed(2)}</td>
      <td class="r muted">${it.sigma.toFixed(2)}</td>
      <td class="c">${stateBadge}</td>
      <td class="r muted">${avg}</td>
      <td>
        <div class="rating-bar-track">
          <div class="rating-bar-ci" style="left:${barLeft}%;width:${barRight - barLeft}%;background:${barColor}"></div>
          <div class="rating-bar" style="left:${Math.max(0, barCenter - 0.5)}%;width:3px;background:${barColor}"></div>
        </div>
      </td>
    </tr>`;
  }
  html += '</table>';
  return html;
}

function renderHeader(data) {
  const m = data.model;
  document.getElementById('model-badge').textContent = m.version ? `v${m.version}` : 'no model';
  document.getElementById('promoted-at').innerHTML = m.promoted_at
    ? `promoted <strong>${ago(m.promoted_at)}</strong>`
    : '<strong>bootstrap</strong> phase';
  document.getElementById('last-refresh').innerHTML = `refreshed <strong>${ago(data.timestamp)}</strong>`;
}

function buildOverview(data) {
  const e = data.elo || {};
  const d = data.data || {};
  const sp = d.selfplay || {};
  const im = d.imitation || {};
  const workers = Object.values(data.workers || {});
  const activeWorkers = workers.filter(w => freshness(w.timestamp) === 'fresh').length;
  const staleWorkers = workers.filter(w => freshness(w.timestamp) === 'stale').length;
  const totalPositions = (sp.total_positions || 0) + (im.total_positions || 0);
  const cycles = ((data.trainer_metrics || {}).cycles || []);
  const latestCycle = cycles.length ? cycles[cycles.length - 1] : null;

  const items = [
    {
      label: 'Promotion',
      value: data.model && data.model.version ? `v${data.model.version}` : 'none',
      meta: data.model && data.model.positions_at_promote != null
        ? `${fmt(data.model.positions_at_promote)} positions at promote`
        : 'waiting for first promotion',
    },
    {
      label: 'Replay',
      value: fmt(totalPositions),
      meta: `${fmt(sp.total_positions || 0)} self-play · ${fmt(im.total_positions || 0)} imitation`,
    },
    {
      label: 'Workers',
      value: fmt(workers.length),
      meta: `<span class="snapshot-status"><span class="dot fresh"></span>${activeWorkers} fresh</span>${staleWorkers ? ` · <span class="snapshot-status"><span class="dot stale"></span>${staleWorkers} stale</span>` : ''}`,
    },
    {
      label: 'Evaluation',
      value: fmt(e.total_games || 0),
      meta: latestCycle
        ? `cycle ${latestCycle.cycle} · ${fmt(latestCycle.total_steps)} total steps`
        : `${fmt((e.active_players || []).length)} tracked players`,
    },
  ];

  document.getElementById('overview').innerHTML = items.map(item => `
    <section class="snapshot">
      <span class="snapshot-label">${item.label}</span>
      <div class="snapshot-value">${item.value}</div>
      <div class="snapshot-meta">${item.meta}</div>
    </section>
  `).join('');
}

function buildRatings(data) {
  const e = data.elo;
  const ratings = e.ratings || {};
  const active = e.active_players || [];
  const ps = e.player_stats || {};

  if (!Object.keys(ratings).length) {
    return panelHtml('ratings', 'Ratings', null,
      `<div class="empty">No ratings yet (${e.total_games} games played)</div>`);
  }

  let body = `<div class="kv-row"><span class="k">total games</span><span class="v">${fmt(e.total_games)}</span></div>`;
  body += renderRatingTable(active, ratings, ps);

  return panelHtml('ratings', 'Ratings', `${active.length} players`, body);
}

function buildData(data) {
  const d = data.data;
  const sp = d.selfplay;
  const im = d.imitation;

  let html = '';
  html += `<div class="kv-row"><span class="k">self-play</span><span class="v">${fmt(sp.total_files)} files &middot; ${fmt(sp.total_positions)} positions</span></div>`;

  const versions = Object.entries(sp.by_version || {});
  if (versions.length) {
    html += '<table><tr><th>version</th><th class="r">files</th><th class="r">positions</th></tr>';
    for (const [ver, info] of versions) {
      html += `<tr><td>${ver}</td><td class="r">${fmt(info.count)}</td><td class="r">${fmt(info.positions)}</td></tr>`;
    }
    html += '</table>';
  }

  html += `<div class="kv-row" style="margin-top:6px"><span class="k">imitation</span><span class="v">${fmt(im.total_files)} files &middot; ${fmt(im.total_positions)} positions</span></div>`;

  if (d.models.length) {
    html += `<div class="kv-row"><span class="k">snapshots</span><span class="v">${d.models.length} versions</span></div>`;
  }

  return panelHtml('data', 'Training Data', null, html);
}

function buildH2H(data) {
  const e = data.elo;
  const active = e.active_players || [];
  const pairs = e.pair_results || {};

  if (active.length < 2) {
    return panelHtml('h2h', 'Head-to-Head', null, '<div class="empty">Not enough players</div>');
  }

  const ratings = e.ratings || {};
  const sorted = [...active].sort((a, b) => {
    const ra = ratings[a], rb = ratings[b];
    if (!ra || !rb) return 0;
    return conservRating(rb.mu, rb.sigma) - conservRating(ra.mu, ra.sigma);
  });

  let html = '<div class="h2h-wrap"><table class="h2h-table"><tr><th></th>';
  for (const p of sorted) {
    html += `<th title="${p}">${shorten(p)}</th>`;
  }
  html += '</tr>';

  for (const row of sorted) {
    html += `<tr><th title="${row}" style="text-align:right">${shorten(row)}</th>`;
    for (const col of sorted) {
      if (row === col) {
        html += '<td class="self">\u2014</td>';
        continue;
      }
      const key = pairKey(row, col);
      const pr = pairs[key];
      if (!pr) {
        html += '<td><span class="h2h-cell none">\u2014</span></td>';
        continue;
      }
      const a_name = key.split(':')[0];
      const rowIsA = row === a_name;
      const wins = rowIsA ? pr.a_wins : pr.b_wins;
      const losses = rowIsA ? pr.b_wins : pr.a_wins;
      const draws = pr.draws;
      const total = wins + losses + draws;
      const winRate = total > 0 ? wins / total : 0.5;

      let cls = 'even';
      if (total >= 3) {
        if (winRate >= 0.6) cls = 'dominant';
        else if (winRate <= 0.4) cls = 'losing';
      }

      html += `<td><span class="h2h-cell ${cls}" title="${row} vs ${col}: ${wins}W ${draws}D ${losses}L">${wins}-${draws}-${losses}</span></td>`;
    }
    html += '</tr>';
  }
  html += '</table></div>';

  return panelHtml('h2h', 'Head-to-Head', `${Object.keys(pairs).length} pairs`, html);
}

function buildGames(data) {
  const games = data.recent_games || [];
  if (!games.length) {
    return panelHtml('games', 'Recent Games', null, '<div class="empty">No games recorded</div>');
  }

  const show = games.slice(-20).reverse();

  let html = '<table><tr><th>white</th><th>black</th><th>result</th><th class="r">moves</th><th class="r">when</th></tr>';
  for (const g of show) {
    let outcomeHtml;
    if (g.outcome === 'white') outcomeHtml = `<span class="game-outcome w">1-0</span>`;
    else if (g.outcome === 'black') outcomeHtml = `<span class="game-outcome b">0-1</span>`;
    else outcomeHtml = `<span class="game-outcome d">\u00bd-\u00bd</span>`;

    html += `<tr>
      <td>${g.white}</td>
      <td>${g.black}</td>
      <td>${outcomeHtml}</td>
      <td class="r">${g.moves}</td>
      <td class="r muted">${ago(g.timestamp)}</td>
    </tr>`;
  }
  html += '</table>';

  return panelHtml('games', 'Recent Games', `${games.length}`, html);
}

function buildWorkers(data) {
  const w = data.workers || {};

  if (!names.length) return panelHtml('workers', 'Workers', null, '<div class="empty">No worker heartbeats</div>');

function _sparkline(values, width, height, color) {
  const finite = values.filter(v => isFinite(v));
  if (finite.length < 2) return '<span class="muted">\u2014</span>';
  const min = Math.min(...finite);
  const max = Math.max(...finite);
  const range = max - min || 1;
  const pts = finite.map((v, i) => {
    const x = (i / (finite.length - 1)) * width;
    const y = height - 2 - ((v - min) / range) * (height - 4);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="display:block;overflow:visible"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function _stackedBar(parts, total) {
  // parts: [{label, value, color}]; total: denominator for widths.
  if (!total) return '<div class="empty">no data</div>';
  let bar = '<div style="display:flex;height:14px;border-radius:3px;overflow:hidden;background:#222;">';
  let legend = '<div style="display:flex;gap:10px;font-size:11px;margin-top:4px;opacity:0.8;">';
  for (const p of parts) {
    const pct = (100 * p.value) / total;
    if (pct > 0) {
      bar += `<div style="width:${pct.toFixed(2)}%;background:${p.color};" title="${p.label}: ${p.value}"></div>`;
    }
    legend += `<span><span style="display:inline-block;width:8px;height:8px;background:${p.color};margin-right:3px;"></span>${p.label} ${p.value}</span>`;
  }
  bar += '</div>';
  legend += '</div>';
  return bar + legend;
}

function buildRunHealth(data) {
  const games = data.recent_games || [];
  let html = '';

  // W/D/L breakdown over the recent-game tail.
  let w = 0, l = 0, d = 0;
  let lengths = [];
  for (const g of games) {
    // Elo-game records now store "outcome" ("white" | "black" | "draw").
    // Keep old-field fallbacks for historic records.
    const winner = g.outcome || g.winner || g.result;
    if (winner === 'draw' || winner === 'd') d++;
    else if (winner === 'white' || winner === 'w') w++;
    else if (winner === 'black' || winner === 'b') l++;
    const ml = (g.white_moves || 0) + (g.black_moves || 0);
    if (ml > 0) lengths.push(ml);
  }
  const total = w + d + l;
  html += `<div class="kv-row"><span class="k">recent W/D/L</span><span class="v">${total} games</span></div>`;
  html += _stackedBar([
    {label: 'W', value: w, color: '#3aa'},
    {label: 'D', value: d, color: '#888'},
    {label: 'L', value: l, color: '#a44'},
  ], total);

  // Game length summary.
  if (lengths.length) {
    lengths.sort((a, b) => a - b);
    const median = lengths[Math.floor(lengths.length / 2)];
    const p5 = lengths[Math.floor(lengths.length * 0.05)];
    const p95 = lengths[Math.floor(lengths.length * 0.95)];
    const mean = (lengths.reduce((s, x) => s + x, 0) / lengths.length).toFixed(1);
    html += `<div class="kv-row" style="margin-top:8px"><span class="k">game length (plies)</span><span class="v">mean ${mean} &middot; median ${median} &middot; p5 ${p5} &middot; p95 ${p95}</span></div>`;
  }

  // Workers: games per worker (cumulative — rate would need a time series).
  const workers = Object.entries(data.workers || {});
  if (workers.length) {
    html += '<table style="margin-top:6px;font-size:12px;"><tr><th>worker</th><th class="r">games</th><th class="r">positions</th></tr>';
    workers.sort((a, b) => (b[1].total_games || 0) - (a[1].total_games || 0));
    for (const [name, w] of workers) {
      html += `<tr><td>${name}</td><td class="r">${fmt(w.total_games || 0)}</td><td class="r">${fmt(w.total_positions || 0)}</td></tr>`;
    }
    html += '</table>';
  }

  if (!html) html = '<div class="empty">awaiting first games</div>';
  return panelHtml('run-health', 'Page 1 / Run Health', `${total}`, html);
}

function buildDataPage(data) {
  // Sublinear KataGo replay window: c=25_000, alpha=0.75, beta=0.4.
  // Mirrors training/replay_window.py — recompute client-side from N_total.
  const C = 25000, A = 0.75, B = 0.4;
  function windowSize(n) {
    if (n <= 0) return 0;
    if (n <= C) return n;
    const t = Math.pow(n / C, A);
    return Math.round(C * (1 + B * (t - 1) / A));
  }

  const sp = (data.data && data.data.selfplay) || {};
  const im = (data.data && data.data.imitation) || {};
  const nTotal = (sp.total_positions || 0) + (im.total_positions || 0);
  const window = windowSize(nTotal);
  const reuse = nTotal > 0 ? (window / nTotal) : 0;

  let html = '';
  html += `<div class="kv-row"><span class="k">N_total</span><span class="v">${fmt(nTotal)} positions</span></div>`;
  html += `<div class="kv-row"><span class="k">replay window</span><span class="v">${fmt(window)} (${(100 * reuse).toFixed(1)}% of N_total)</span></div>`;

  // Per-version contribution stacked bar.
  const byVer = sp.by_version || {};
  const entries = Object.entries(byVer).sort((a, b) => Number(a[0]) - Number(b[0]));
  if (entries.length) {
    const total = entries.reduce((s, [, v]) => s + (v.positions || 0), 0);
    const palette = ['#3aa', '#5b6', '#cc6', '#c84', '#a44', '#849', '#469', '#666'];
    const parts = entries.map(([ver, info], i) => ({
      label: `v${ver}`,
      value: info.positions || 0,
      color: palette[i % palette.length],
    }));
    html += '<div class="kv-row" style="margin-top:8px"><span class="k">per-version contribution</span></div>';
    html += _stackedBar(parts, total);
  }

  return panelHtml('data-page', 'Page 2 / Data', `${fmt(nTotal)}`, html);
}

      </ul>`);
  }

  const latest = cycles[cycles.length - 1];
  const lossDefs = [
    {name: 'policy', key: 'loss_policy', color: '#3aa'},
    {name: 'value',  key: 'loss_value',  color: '#5b6'},
    {name: 'mlh',    key: 'loss_mlh',    color: '#cc6'},
    {name: 'stv',    key: 'loss_stv',    color: '#c84'},
    {name: 'aux',    key: 'loss_aux',    color: '#849'},

  let html = '';

    html += `<tr>

    <li>KL(old \u2192 new) per promotion — not yet instrumented</li>
  </ul>`;

  return panelHtml('model-behavior', 'Page 3 / Model Behavior', `cycle ${latest.cycle}`, html);
}

function buildBenchmarks(data) {
  const bvs = (data.benchmark_versions || []).slice().sort((a, b) => a.version - b.version);
  const br = data.benchmark_results || {};

  if (!bvs.length) {
    return panelHtml('benchmarks', 'Page 5 / Benchmarks', 'waiting', `
      <div class="empty">awaiting first benchmark run</div>
      <div style="font-size:11px;opacity:0.6;margin-top:6px">
        Run after each promotion: <code>uv run python -m training.benchmark_runner</code>
      </div>`);
  }

  // Precompute version keys once to avoid repeated string operations in loops.
  const vkeys = bvs.map(vs => vs.name.slice(0, -5));

  // Collect all position IDs (in order of first appearance).
  const posOrder = [];
  const posMeta = {};
  for (const vk of vkeys) {
    for (const r of ((br[vk] || {}).results || [])) {
      if (!posMeta[r.id]) {
        posMeta[r.id] = {category: r.category};
        posOrder.push(r.id);
      }
    }
  }

  if (!posOrder.length) {
    return panelHtml('benchmarks', 'Page 5 / Benchmarks', `${bvs.length}v`, '<div class="empty">no position results found</div>');
  }

  // Build lookup: versionKey -> posId -> result
  const lkp = {};
  for (const vk of vkeys) {
    lkp[vk] = {};
    for (const r of ((br[vk] || {}).results || [])) lkp[vk][r.id] = r;
  }

  let html = '<div style="overflow-x:auto"><table class="h2h-table" style="font-size:10px">';
  html += '<tr><th style="text-align:left;min-width:90px">position</th><th>cat</th>';
  for (const vk of vkeys) html += `<th>${vk}</th>`;
  html += '</tr>';

  for (const posId of posOrder) {
    const meta = posMeta[posId];
    html += `<tr><td style="font-size:10px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${posId}">${posId}</td><td class="muted">${meta.category.slice(0, 4)}</td>`;
    const refMove = vkeys.map(vk => lkp[vk][posId]).find(r => r)?.best_move ?? null;
    for (const vk of vkeys) {
      const r = lkp[vk][posId];
      if (!r) { html += '<td class="muted" style="opacity:0.3">\u2014</td>'; continue; }
      const t = Math.max(0, Math.min(1, (r.value + 1) / 2));
      const bg = `rgba(${Math.round(160 * (1 - t))},${Math.round(160 * t)},30,0.45)`;
      const flag = r.best_move !== refMove ? '\u26a1' : '';
      html += `<td style="background:${bg};font-size:9px;white-space:nowrap" title="${r.best_move} (val=${r.value.toFixed(3)})">${r.best_move}${flag}</td>`;
    }
    html += '</tr>';
  }
  html += '</table></div>';

  return panelHtml('benchmarks', 'Page 5 / Benchmarks', `${bvs.length}v \u00d7 ${posOrder.length}pos`, html);
}

function buildDiffViewer(data) {
  const bvs = (data.benchmark_versions || []).slice().sort((a, b) => a.version - b.version);
  const br = data.benchmark_results || {};

  if (bvs.length < 2) {
    return panelHtml('diff-viewer', 'Page 6 / Diff Viewer', 'waiting', '<div class="empty">awaiting \u22652 benchmark runs</div>');
  }

  const prev = bvs[bvs.length - 2];
  const curr = bvs[bvs.length - 1];
  const pk = prev.name.replace('.json', '');
  const ck = curr.name.replace('.json', '');
  const prevRes = (br[pk] || {}).results || [];
  const currRes = (br[ck] || {}).results || [];

  if (!prevRes.length || !currRes.length) {
    return panelHtml('diff-viewer', 'Page 6 / Diff Viewer', `${pk} \u2192 ${ck}`, '<div class="empty">results not yet loaded</div>');
  }

  const pm = Object.fromEntries(prevRes.map(r => [r.id, r]));
  const cm = Object.fromEntries(currRes.map(r => [r.id, r]));

  const diffs = [];
  for (const id of [...new Set([...Object.keys(pm), ...Object.keys(cm)])]) {
    const p = pm[id]; const c = cm[id];
    if (!p || !c) continue;
    const moveChanged = p.best_move !== c.best_move;
    const dv = c.value - p.value;
    if (moveChanged || Math.abs(dv) > 0.05) diffs.push({id, p, c, moveChanged, dv});
  }

  let html = `<div class="kv-row" style="margin-bottom:8px"><span class="k">comparing</span><span class="v">${pk} \u2192 ${ck}</span></div>`;

  if (!diffs.length) {
    html += '<div style="color:var(--green);font-size:12px">\u2714 no changes \u2014 all positions stable</div>';
  } else {
    html += `<div style="margin-bottom:6px;font-size:11px;opacity:0.7">${diffs.length} position${diffs.length !== 1 ? 's' : ''} changed</div>`;
    html += '<table><tr><th>position</th><th>cat</th><th>prev move</th><th>curr move</th><th class="r">\u0394value</th></tr>';
    for (const {id, p, c, moveChanged, dv} of diffs) {
      const dc = dv > 0.01 ? 'var(--green)' : dv < -0.01 ? 'var(--red)' : 'var(--text-dim)';
      html += `<tr>
        <td style="font-size:10px;max-width:80px;overflow:hidden;text-overflow:ellipsis" title="${id}">${id}</td>
        <td class="muted">${p.category.slice(0, 4)}</td>
        <td style="${moveChanged ? 'color:var(--amber)' : ''}">${p.best_move}</td>
        <td style="${moveChanged ? 'color:var(--green);font-weight:600' : ''}">${c.best_move}</td>
        <td class="r" style="color:${dc}">${dv > 0 ? '+' : ''}${dv.toFixed(3)}</td>
      </tr>`;
    }
    html += '</table>';
  }

  return panelHtml('diff-viewer', 'Page 6 / Diff Viewer', `${pk} \u2192 ${ck}`, html);
}

function buildReplayAudit(data) {
  const sp = (data.data && data.data.selfplay) || {};
  const byVer = sp.by_version || {};
  const entries = Object.entries(byVer).sort((a, b) => {
    const an = parseInt(a[0].replace(/[^0-9]/g, ''), 10) || 0;
    const bn = parseInt(b[0].replace(/[^0-9]/g, ''), 10) || 0;
    return an - bn;
  });

  if (!entries.length) {
    return panelHtml('replay-audit', 'Page 7 / Replay Audit', 'waiting', '<div class="empty">awaiting self-play data</div>');
  }

  // Replicate client-side window formula from buildDataPage.
  const C = 25000, A = 0.75, B = 0.4;
  function windowSize(n) {
    if (n <= 0) return 0;
    if (n <= C) return n;
    const t = Math.pow(n / C, A);
    return Math.round(C * (1 + B * (t - 1) / A));
  }

  const nTotal = sp.total_positions || 0;
  const window = windowSize(nTotal);

  let html = '';
  html += `<div class="kv-row"><span class="k">N_total</span><span class="v">${fmt(nTotal)} positions</span></div>`;
  html += `<div class="kv-row" style="margin-bottom:8px"><span class="k">window</span><span class="v">${fmt(window)} (${nTotal > 0 ? (100 * window / nTotal).toFixed(1) : 0}% of N_total)</span></div>`;

  const maxPos = entries.reduce((m, [, v]) => Math.max(m, v.positions || 0), 0);
  html += '<table><tr><th>version</th><th class="r">files</th><th class="r">positions</th><th class="r">% of total</th><th style="min-width:80px"></th></tr>';
  for (const [ver, info] of entries) {
    const pos = info.positions || 0;
    const pct = nTotal > 0 ? (100 * pos / nTotal) : 0;
    const bw = maxPos > 0 ? (100 * pos / maxPos).toFixed(1) : 0;
    html += `<tr>
      <td style="font-weight:500">${ver}</td>
      <td class="r muted">${fmt(info.count)}</td>
      <td class="r">${fmt(pos)}</td>
      <td class="r muted">${pct.toFixed(1)}%</td>
      <td><div style="height:8px;background:var(--bg-deep);border-radius:2px;overflow:hidden"><div style="width:${bw}%;height:100%;background:#3aa;border-radius:2px"></div></div></td>
    </tr>`;
  }
  html += '</table>';

  return panelHtml('replay-audit', 'Page 7 / Replay Audit', `${entries.length}v`, html);
}

function render(data) {
  if (!data) return;
  lastData = data;
  renderHeader(data);
  buildOverview(data);

  const panels = document.getElementById('panels');
  if (firstRender) panels.classList.add('initial');

  const retiredHtml = buildRetired(data);

  panels.innerHTML = [
    buildRatings(data),
    buildData(data),
    buildRunHealth(data),
    buildDataPage(data),
    buildModelBehavior(data),
    buildSearch(data),
    buildBenchmarks(data),
    buildDiffViewer(data),
    buildReplayAudit(data),
    buildH2H(data),
    retiredHtml,
    `<div class="two-col">
      ${buildGames(data)}
      ${buildWorkers(data)}
    </div>`,
  ].join('');

  if (firstRender) {
    firstRender = false;
    setTimeout(() => panels.classList.remove('initial'), 500);
  }
}

async function refresh() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('last-refresh').textContent = `error: ${e.message}`;
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
