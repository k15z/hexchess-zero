<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hexchess training</title>
<link rel="icon" type="image/png" href="/icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg-deep: #09090b;
    --bg-base: #0e0e11;
    --bg-raised: #141417;
    --bg-surface: #1a1a1f;
    --border-dim: #1e1e24;
    --border-mid: #2a2a33;
    --text-primary: #e4e4e7;
    --text-secondary: #a1a1aa;
    --text-dim: #52525b;
    --accent: #e4e4e7;
    --accent-dim: #71717a;
    --green: #22c55e;
    --amber: #eab308;
    --red: #ef4444;
    --mono: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    --sans: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg-deep);
    color: var(--text-primary);
    font-size: 12px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .container {
    position: relative;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px 48px;
  }

  /* --- Header --- */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border-mid);
    padding: 12px 0;
    margin-bottom: 20px;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }

  .logo span { color: var(--text-dim); font-weight: 400; }

  .model-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-surface);
    border: 1px solid var(--border-mid);
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .header-meta {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
  }

  /* --- Section panels --- */
  .panel {
    background: var(--bg-base);
    border: 1px solid var(--border-dim);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border-dim);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .panel-header:hover { background: var(--bg-surface); }
  .panel-header > * { pointer-events: none; }

  .panel-title {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
  }

  .panel-badge {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 400;
    padding: 1px 6px;
    background: var(--bg-deep);
    border-radius: 3px;
    border: 1px solid var(--border-dim);
  }

  .panel-chevron {
    color: var(--text-dim);
    font-size: 10px;
    transition: transform 0.2s;
  }

  .panel.collapsed .panel-chevron { transform: rotate(-90deg); }
  .panel.collapsed .panel-body { display: none; }

  .panel-body { padding: 10px 12px; }

  /* --- Two-column grid for bottom panels --- */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .two-col .panel { margin-bottom: 0; }

  @media (max-width: 640px) {
    .two-col { grid-template-columns: 1fr; }
  }

  /* --- Tables --- */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    padding: 4px 8px;
    border-bottom: 1px solid var(--border-dim);
    white-space: nowrap;
  }

  th.r, td.r { text-align: right; }
  th.c, td.c { text-align: center; }

  /* --- Evaluated / provisional badge --- */
  .eval-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1px solid transparent;
  }
  .eval-badge.eval {
    color: var(--green);
    border-color: rgba(34, 197, 94, 0.35);
    background: rgba(34, 197, 94, 0.08);
  }
  .eval-badge.prov {
    color: var(--amber);
    border-color: rgba(234, 179, 8, 0.35);
    background: rgba(234, 179, 8, 0.08);
  }

  /* Dim provisional rows, but leave the CI bar cell at full opacity so
     the already-subtle (--rating-bar-ci: opacity 0.2) bar remains legible. */
  tr.provisional td { opacity: 0.55; }
  tr.provisional td:last-child { opacity: 1; }

  td {
    padding: 4px 8px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    border-bottom: 1px solid rgba(30, 30, 36, 0.5);
  }

  tr:last-child td { border-bottom: none; }

  /* --- Rating bars --- */
  .rating-bar-track {
    flex: 1;
    height: 14px;
    background: var(--bg-deep);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    min-width: 60px;
  }

  .rating-bar {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    border-radius: 2px;
    transition: width 0.4s ease;
    min-width: 2px;
  }

  .rating-bar-ci {
    position: absolute;
    top: 2px; bottom: 2px;
    border-radius: 1px;
    opacity: 0.2;
  }

  /* --- Worker dots --- */
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 4px;
  }

  .dot.fresh { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .dot.stale { background: var(--amber); }
  .dot.dead { background: var(--red); }

  /* --- Head-to-head matrix --- */
  .h2h-wrap { overflow-x: auto; }

  .h2h-table th, .h2h-table td {
    text-align: center;
    padding: 3px 4px;
    font-size: 10px;
    min-width: 56px;
  }

  .h2h-table th {
    font-size: 9px;
    max-width: 64px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .h2h-table td.self {
    background: var(--bg-surface);
    color: var(--text-dim);
  }

  .h2h-cell {
    border-radius: 2px;
    padding: 2px 4px;
    font-size: 10px;
    font-weight: 500;
  }

  .h2h-cell.dominant { color: var(--green); }
  .h2h-cell.losing { color: var(--red); }
  .h2h-cell.even { color: var(--text-dim); }
  .h2h-cell.none { color: var(--text-dim); opacity: 0.3; }

  /* --- Game log --- */
  .game-outcome {
    font-weight: 600;
    font-size: 11px;
  }

  .game-outcome.w { color: var(--green); }
  .game-outcome.b { color: var(--red); }
  .game-outcome.d { color: var(--text-dim); }

  /* --- KV pairs --- */
  .kv-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .kv-row .k { color: var(--text-dim); }
  .kv-row .v { color: var(--text-primary); font-weight: 500; }

  /* --- Misc --- */
  .empty { color: var(--text-dim); font-style: italic; padding: 12px 0; }
  .muted { color: var(--text-dim); }

  /* --- Fade in --- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .initial .panel { animation: fadeUp 0.3s ease both; }
  .initial .panel:nth-child(2) { animation-delay: 0.04s; }
  .initial .panel:nth-child(3) { animation-delay: 0.08s; }
  .initial .panel:nth-child(4) { animation-delay: 0.12s; }
  .initial .two-col .panel { animation: fadeUp 0.3s ease both; animation-delay: 0.16s; }
  .initial .two-col .panel:nth-child(2) { animation-delay: 0.20s; }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="header-row">
    <div class="header-left">
      <div class="logo">hexchess <span>// training</span></div>
      <span class="model-badge" id="model-badge">&mdash;</span>
    </div>
    <div class="header-meta">
      <div id="promoted-at"></div>
      <div id="last-refresh"></div>
    </div>
  </div>
</div>

<div id="panels"></div>

</div>

<script>
const REFRESH_MS = 60000;
const CONSERVATIVE_Z = 2.0;
// Sigma posterior tight enough that mu is meaningful. Must match
// EVALUATED_SIGMA_THRESHOLD in training/elo.py.
const EVALUATED_SIGMA_THRESHOLD = 2.5;
const BASELINES = new Set(['Minimax-2', 'Minimax-3', 'Minimax-4', 'Heuristic']);

function conservRating(mu, sigma) { return mu - CONSERVATIVE_Z * sigma; }
function isEvaluated(sigma) { return sigma <= EVALUATED_SIGMA_THRESHOLD; }

function ago(ts) {
  if (!ts) return '';
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  if (s < 0) return 'just now';
  if (s < 60) return Math.floor(s) + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function fmt(n) {
  if (n == null) return '\u2014';
  return typeof n === 'number' ? n.toLocaleString() : n;
}

function freshness(ts) {
  if (!ts) return 'dead';
  const age = (Date.now() - new Date(ts).getTime()) / 1000;
  if (age < 120) return 'fresh';
  if (age < 600) return 'stale';
  return 'dead';
}

function pairKey(a, b) { return [a, b].sort().join(':'); }
function shorten(s) { return s.length > 7 ? s.slice(0, 6) + '\u2026' : s; }

// --- Panel collapse state ---
const panelState = {};
function togglePanel(id) {
  panelState[id] = !panelState[id];
  render(lastData);
}

let lastData = null;
let firstRender = true;

// --- Render helpers ---
function panelHtml(id, title, badge, body, defaultOpen = true) {
  const collapsed = panelState[id] !== undefined ? panelState[id] : !defaultOpen;
  return `<div class="panel ${collapsed ? 'collapsed' : ''}" id="panel-${id}">
    <div class="panel-header" onclick="togglePanel('${id}')">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="panel-title">${title}</span>
        ${badge ? `<span class="panel-badge">${badge}</span>` : ''}
      </div>
      <span class="panel-chevron">&#9660;</span>
    </div>
    <div class="panel-body">${body}</div>
  </div>`;
}

function renderRatingTable(players, ratings, playerStats) {
  if (!players.length) return '';

  const items = players
    .filter(n => ratings[n])
    .map(n => {
      const r = ratings[n];
      return {
        name: n,
        mu: r.mu,
        sigma: r.sigma,
        cr: conservRating(r.mu, r.sigma),
        evaluated: isEvaluated(r.sigma),
      };
    })
    .sort((a, b) => b.cr - a.cr);

  if (!items.length) return '';

  // Bar is centered on the conservative rating (same value shown in the
  // "rating" column) with ±σ as the CI half-width, so the tick always
  // lines up with the displayed number.
  const minCr = Math.min(...items.map(i => i.cr - i.sigma));
  const maxCr = Math.max(...items.map(i => i.cr + i.sigma));
  const range = Math.max(maxCr - minCr, 1);
  const base = minCr - range * 0.05;
  const span = range * 1.1;

  let html = '<table><tr><th style="width:24px">#</th><th>player</th><th class="r">rating</th><th class="r" style="width:56px">\u03bc</th><th class="r" style="width:48px">\u00b1\u03c3</th><th class="c" style="width:52px">state</th><th class="r" style="width:52px">s/mv</th><th style="min-width:100px"></th></tr>';

  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    const ps = playerStats[it.name];
    const avg = ps && ps.total_moves > 0 ? (ps.total_time / ps.total_moves).toFixed(2) : '\u2014';

    const barLeft = Math.max(0, ((it.cr - it.sigma) - base) / span * 100);
    const barRight = Math.min(100, ((it.cr + it.sigma) - base) / span * 100);
    const barCenter = (it.cr - base) / span * 100;

    const isBaseline = BASELINES.has(it.name);
    const barColor = isBaseline ? 'var(--accent-dim)' : 'var(--accent)';
    // Provisional players get a "prov" class — CSS dims their text cells
    // only (not the CI bar, which already has its own opacity).
    const rowClass = it.evaluated ? '' : 'provisional';
    const stateBadge = it.evaluated
      ? `<span class="eval-badge eval" title="sigma \u2264 ${EVALUATED_SIGMA_THRESHOLD} — posterior tight, mu meaningful">eval</span>`
      : `<span class="eval-badge prov" title="sigma > ${EVALUATED_SIGMA_THRESHOLD} — provisional, mu not yet trustworthy">prov</span>`;

    html += `<tr class="${rowClass}">
      <td class="r muted">${i + 1}</td>
      <td style="${isBaseline ? 'color:var(--text-dim)' : ''}">${it.name}</td>
      <td class="r" style="font-weight:600">${it.cr >= 0 ? '+' : ''}${it.cr.toFixed(2)}</td>
      <td class="r muted">${it.mu.toFixed(2)}</td>
      <td class="r muted">${it.sigma.toFixed(2)}</td>
      <td class="c">${stateBadge}</td>
      <td class="r muted">${avg}</td>
      <td>
        <div class="rating-bar-track">
          <div class="rating-bar-ci" style="left:${barLeft}%;width:${barRight - barLeft}%;background:${barColor}"></div>
          <div class="rating-bar" style="left:${Math.max(0, barCenter - 0.5)}%;width:3px;background:${barColor}"></div>
        </div>
      </td>
    </tr>`;
  }
  html += '</table>';
  return html;
}

function renderHeader(data) {
  const m = data.model;
  document.getElementById('model-badge').textContent = m.version ? `v${m.version}` : 'no model';
  document.getElementById('promoted-at').textContent = m.promoted_at ? `promoted ${ago(m.promoted_at)}` : 'bootstrap';
  document.getElementById('last-refresh').textContent = `refreshed ${ago(data.timestamp)}`;
}

function buildRatings(data) {
  const e = data.elo;
  const ratings = e.ratings || {};
  const active = e.active_players || [];
  const ps = e.player_stats || {};

  if (!Object.keys(ratings).length) {
    return panelHtml('ratings', 'Ratings', null,
      `<div class="empty">No ratings yet (${e.total_games} games played)</div>`);
  }

  let body = `<div class="kv-row"><span class="k">total games</span><span class="v">${fmt(e.total_games)}</span></div>`;
  body += renderRatingTable(active, ratings, ps);

  return panelHtml('ratings', 'Ratings', `${active.length} players`, body);
}

function buildData(data) {
  const d = data.data;
  const sp = d.selfplay;
  const im = d.imitation;

  let html = '';
  html += `<div class="kv-row"><span class="k">self-play</span><span class="v">${fmt(sp.total_files)} files &middot; ${fmt(sp.total_positions)} positions</span></div>`;

  const versions = Object.entries(sp.by_version || {});
  if (versions.length) {
    html += '<table><tr><th>version</th><th class="r">files</th><th class="r">positions</th></tr>';
    for (const [ver, info] of versions) {
      html += `<tr><td>${ver}</td><td class="r">${fmt(info.count)}</td><td class="r">${fmt(info.positions)}</td></tr>`;
    }
    html += '</table>';
  }

  html += `<div class="kv-row" style="margin-top:6px"><span class="k">imitation</span><span class="v">${fmt(im.total_files)} files &middot; ${fmt(im.total_positions)} positions</span></div>`;

  if (d.models.length) {
    html += `<div class="kv-row"><span class="k">snapshots</span><span class="v">${d.models.length} versions</span></div>`;
  }

  return panelHtml('data', 'Training Data', null, html, false);
}

function buildH2H(data) {
  const e = data.elo;
  const active = e.active_players || [];
  const pairs = e.pair_results || {};

  if (active.length < 2) {
    return panelHtml('h2h', 'Head-to-Head', null, '<div class="empty">Not enough players</div>', false);
  }

  const ratings = e.ratings || {};
  const sorted = [...active].sort((a, b) => {
    const ra = ratings[a], rb = ratings[b];
    if (!ra || !rb) return 0;
    return conservRating(rb.mu, rb.sigma) - conservRating(ra.mu, ra.sigma);
  });

  let html = '<div class="h2h-wrap"><table class="h2h-table"><tr><th></th>';
  for (const p of sorted) {
    html += `<th title="${p}">${shorten(p)}</th>`;
  }
  html += '</tr>';

  for (const row of sorted) {
    html += `<tr><th title="${row}" style="text-align:right">${shorten(row)}</th>`;
    for (const col of sorted) {
      if (row === col) {
        html += '<td class="self">\u2014</td>';
        continue;
      }
      const key = pairKey(row, col);
      const pr = pairs[key];
      if (!pr) {
        html += '<td><span class="h2h-cell none">\u2014</span></td>';
        continue;
      }
      const a_name = key.split(':')[0];
      const rowIsA = row === a_name;
      const wins = rowIsA ? pr.a_wins : pr.b_wins;
      const losses = rowIsA ? pr.b_wins : pr.a_wins;
      const draws = pr.draws;
      const total = wins + losses + draws;
      const winRate = total > 0 ? wins / total : 0.5;

      let cls = 'even';
      if (total >= 3) {
        if (winRate >= 0.6) cls = 'dominant';
        else if (winRate <= 0.4) cls = 'losing';
      }

      html += `<td><span class="h2h-cell ${cls}" title="${row} vs ${col}: ${wins}W ${draws}D ${losses}L">${wins}-${draws}-${losses}</span></td>`;
    }
    html += '</tr>';
  }
  html += '</table></div>';

  return panelHtml('h2h', 'Head-to-Head', `${Object.keys(pairs).length} pairs`, html, false);
}

function buildGames(data) {
  const games = data.recent_games || [];
  if (!games.length) {
    return panelHtml('games', 'Recent Games', null, '<div class="empty">No games recorded</div>');
  }

  const show = games.slice(-20).reverse();

  let html = '<table><tr><th>white</th><th>black</th><th>result</th><th class="r">moves</th><th class="r">when</th></tr>';
  for (const g of show) {
    let outcomeHtml;
    if (g.outcome === 'white') outcomeHtml = `<span class="game-outcome w">1-0</span>`;
    else if (g.outcome === 'black') outcomeHtml = `<span class="game-outcome b">0-1</span>`;
    else outcomeHtml = `<span class="game-outcome d">\u00bd-\u00bd</span>`;

    html += `<tr>
      <td>${g.white}</td>
      <td>${g.black}</td>
      <td>${outcomeHtml}</td>
      <td class="r">${g.moves}</td>
      <td class="r muted">${ago(g.timestamp)}</td>
    </tr>`;
  }
  html += '</table>';

  return panelHtml('games', 'Recent Games', `${games.length}`, html, false);
}

function buildWorkers(data) {
  const w = data.workers || {};
  const names = Object.keys(w).sort();
  if (!names.length) return panelHtml('workers', 'Workers', null, '<div class="empty">No worker heartbeats</div>', false);

  let html = `<table><tr><th></th><th>worker</th><th>model</th><th class="r">games</th><th class="r">pos</th><th class="r">seen</th></tr>`;
  for (const name of names) {
    const hb = w[name];
    const cls = freshness(hb.timestamp);
    html += `<tr>
      <td><span class="dot ${cls}"></span></td>
      <td>${name}</td>
      <td>v${hb.model_version ?? '?'}</td>
      <td class="r">${fmt(hb.total_games)}</td>
      <td class="r">${fmt(hb.total_positions)}</td>
      <td class="r muted">${ago(hb.timestamp)}</td>
    </tr>`;
  }
  html += '</table>';
  return panelHtml('workers', 'Workers', `${names.length}`, html, false);
}

function buildRetired(data) {
  const e = data.elo;
  const retired = e.retired_players || [];
  const ratings = e.ratings || {};
  const ps = e.player_stats || {};

  if (!retired.length) return '';

  const body = renderRatingTable(retired, ratings, ps);
  if (!body) return '';
  return panelHtml('retired', 'Retired', `${retired.length}`, body, false);
}

// --- Plan §7.6 pages 1-4 ---
// Pages 1 and 2 are wired against the metrics already in /api/status.
// Pages 3 and 4 still need new metric pipelines (loss snapshots in S3 for
// page 3, TT-hit-rate in worker heartbeats for page 4) and stay as TODO
// placeholders that list what they're waiting on.
// TODO(plan §7.6 page 5 — benchmark suite stability heatmap)
// TODO(plan §7.6 page 6 — diff viewer)
// TODO(plan §7.6 page 7 — replay buffer audit browser)

function _stackedBar(parts, total) {
  // parts: [{label, value, color}]; total: denominator for widths.
  if (!total) return '<div class="empty">no data</div>';
  let bar = '<div style="display:flex;height:14px;border-radius:3px;overflow:hidden;background:#222;">';
  let legend = '<div style="display:flex;gap:10px;font-size:11px;margin-top:4px;opacity:0.8;">';
  for (const p of parts) {
    const pct = (100 * p.value) / total;
    if (pct > 0) {
      bar += `<div style="width:${pct.toFixed(2)}%;background:${p.color};" title="${p.label}: ${p.value}"></div>`;
    }
    legend += `<span><span style="display:inline-block;width:8px;height:8px;background:${p.color};margin-right:3px;"></span>${p.label} ${p.value}</span>`;
  }
  bar += '</div>';
  legend += '</div>';
  return bar + legend;
}

function buildRunHealth(data) {
  const games = data.recent_games || [];
  let html = '';

  // W/D/L breakdown over the recent-game tail.
  let w = 0, l = 0, d = 0;
  let lengths = [];
  for (const g of games) {
    const winner = g.winner || g.result;
    if (winner === 'draw' || winner === 'd') d++;
    else if (winner === 'white' || winner === 'w') w++;
    else if (winner === 'black' || winner === 'b') l++;
    const ml = (g.white_moves || 0) + (g.black_moves || 0);
    if (ml > 0) lengths.push(ml);
  }
  const total = w + d + l;
  html += `<div class="kv-row"><span class="k">recent W/D/L</span><span class="v">${total} games</span></div>`;
  html += _stackedBar([
    {label: 'W', value: w, color: '#3aa'},
    {label: 'D', value: d, color: '#888'},
    {label: 'L', value: l, color: '#a44'},
  ], total);

  // Game length summary.
  if (lengths.length) {
    lengths.sort((a, b) => a - b);
    const median = lengths[Math.floor(lengths.length / 2)];
    const p5 = lengths[Math.floor(lengths.length * 0.05)];
    const p95 = lengths[Math.floor(lengths.length * 0.95)];
    const mean = (lengths.reduce((s, x) => s + x, 0) / lengths.length).toFixed(1);
    html += `<div class="kv-row" style="margin-top:8px"><span class="k">game length (plies)</span><span class="v">mean ${mean} &middot; median ${median} &middot; p5 ${p5} &middot; p95 ${p95}</span></div>`;
  }

  // Workers: games per worker (cumulative — rate would need a time series).
  const workers = Object.entries(data.workers || {});
  if (workers.length) {
    html += '<table style="margin-top:6px;font-size:12px;"><tr><th>worker</th><th class="r">games</th><th class="r">positions</th></tr>';
    workers.sort((a, b) => (b[1].total_games || 0) - (a[1].total_games || 0));
    for (const [name, w] of workers) {
      html += `<tr><td>${name}</td><td class="r">${fmt(w.total_games || 0)}</td><td class="r">${fmt(w.total_positions || 0)}</td></tr>`;
    }
    html += '</table>';
  }

  if (!html) html = '<div class="empty">awaiting first games</div>';
  return panelHtml('run-health', 'Page 1 — Run Health', `${total}`, html, false);
}

function buildDataPage(data) {
  // Sublinear KataGo replay window: c=25_000, alpha=0.75, beta=0.4.
  // Mirrors training/replay_window.py — recompute client-side from N_total.
  const C = 25000, A = 0.75, B = 0.4;
  function windowSize(n) {
    if (n <= 0) return 0;
    if (n <= C) return n;
    const t = Math.pow(n / C, A);
    return Math.round(C * (1 + B * (t - 1) / A));
  }

  const sp = (data.data && data.data.selfplay) || {};
  const im = (data.data && data.data.imitation) || {};
  const nTotal = (sp.total_positions || 0) + (im.total_positions || 0);
  const window = windowSize(nTotal);
  const reuse = nTotal > 0 ? (window / nTotal) : 0;

  let html = '';
  html += `<div class="kv-row"><span class="k">N_total</span><span class="v">${fmt(nTotal)} positions</span></div>`;
  html += `<div class="kv-row"><span class="k">replay window</span><span class="v">${fmt(window)} (${(100 * reuse).toFixed(1)}% of N_total)</span></div>`;

  // Per-version contribution stacked bar.
  const byVer = sp.by_version || {};
  const entries = Object.entries(byVer).sort((a, b) => Number(a[0]) - Number(b[0]));
  if (entries.length) {
    const total = entries.reduce((s, [, v]) => s + (v.positions || 0), 0);
    const palette = ['#3aa', '#5b6', '#cc6', '#c84', '#a44', '#849', '#469', '#666'];
    const parts = entries.map(([ver, info], i) => ({
      label: `v${ver}`,
      value: info.positions || 0,
      color: palette[i % palette.length],
    }));
    html += '<div class="kv-row" style="margin-top:8px"><span class="k">per-version contribution</span></div>';
    html += _stackedBar(parts, total);
  }

  return panelHtml('data-page', 'Page 2 — Data', `${fmt(nTotal)}`, html, false);
}

function buildModelBehavior(data) {
  const body = `
    <div class="empty">awaiting trainer metric snapshots</div>
    <ul style="margin:8px 0 0 18px;font-size:12px;opacity:0.7">
      <li>WDL calibration plot — needs trainer to publish step metrics to S3</li>
      <li>Policy entropy histogram — needs trainer to publish step metrics to S3</li>
      <li>NN argmax vs MCTS argmax agreement — needs trainer instrumentation</li>
      <li>KL(old → new) per promotion — needs to compare consecutive ONNX exports</li>
    </ul>`;
  return panelHtml('model-behavior', 'Page 3 — Model Behavior', 'TODO', body, false);

function buildSearch(data) {
  const body = `
    <div class="empty">awaiting worker heartbeat extension</div>
    <ul style="margin:8px 0 0 18px;font-size:12px;opacity:0.7">
      <li>TT hit rate per worker — needs worker to add tt_stats to heartbeat</li>
      <li>Mean root visits / PV length — needs game-level metric in meta sidecar</li>

    </ul>`;
  return panelHtml('search', 'Page 4 — Search', 'TODO', body, false);
}

function render(data) {
  if (!data) return;
  lastData = data;
  renderHeader(data);

  const panels = document.getElementById('panels');
  if (firstRender) panels.classList.add('initial');

  const retiredHtml = buildRetired(data);

  panels.innerHTML = [
    buildRatings(data),
    buildData(data),
    buildRunHealth(data),
    buildDataPage(data),
    buildModelBehavior(data),
    buildSearch(data),
    buildH2H(data),
    retiredHtml,
    `<div class="two-col">
      ${buildGames(data)}
      ${buildWorkers(data)}
    </div>`,
  ].join('');

  if (firstRender) {
    firstRender = false;
    setTimeout(() => panels.classList.remove('initial'), 500);
  }
}

async function refresh() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('last-refresh').textContent = `error: ${e.message}`;
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
