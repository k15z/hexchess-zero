<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hexchess evaluation</title>
<link rel="icon" type="image/png" href="/icon.png">
<style>
  :root {
    --bg: #f2efe8;
    --paper: rgba(255, 251, 242, 0.86);
    --paper-strong: rgba(255, 249, 238, 0.94);
    --ink: #1f241f;
    --muted: #6d6a61;
    --line: rgba(58, 55, 48, 0.14);
    --accent: #245e4a;
    --accent-soft: rgba(36, 94, 74, 0.12);
    --warn: #8a5a18;
    --warn-soft: rgba(138, 90, 24, 0.14);
    --danger: #8c2d2d;
    --danger-soft: rgba(140, 45, 45, 0.12);
    --shadow: 0 20px 60px rgba(49, 42, 25, 0.08);
    --display: "Avenir Next Condensed", "Arial Narrow", "Helvetica Neue", sans-serif;
    --sans: "Avenir Next", "Segoe UI", sans-serif;
    --mono: "IBM Plex Mono", "SF Mono", "Cascadia Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(36, 94, 74, 0.18), transparent 30%),
      radial-gradient(circle at top right, rgba(138, 90, 24, 0.15), transparent 32%),
      linear-gradient(180deg, #ece7dd 0%, var(--bg) 35%, #f7f3eb 100%);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  .hero {
    padding: 28px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: linear-gradient(135deg, var(--paper-strong), rgba(255, 249, 238, 0.7));
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
  }

  .hero::after {
    content: "";
    position: absolute;
    inset: auto -10% -25% 45%;
    height: 260px;
    background: radial-gradient(circle, rgba(36, 94, 74, 0.12), transparent 70%);
    pointer-events: none;
  }

  .hero-top {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font: 700 12px/1 var(--mono);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .hero h1 {
    margin: 0;
    font-family: var(--display);
    font-size: clamp(42px, 7vw, 82px);
    line-height: 0.94;
    letter-spacing: -0.05em;
    max-width: 760px;
  }

  .hero-sub {
    margin-top: 16px;
    max-width: 760px;
    font-size: 15px;
    line-height: 1.55;
    color: var(--muted);
  }

  .hero-meta {
    display: grid;
    gap: 10px;
    min-width: 220px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255, 252, 246, 0.75);
    font: 700 12px/1 var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    width: fit-content;
  }

  .pill.pass { background: var(--accent-soft); color: var(--accent); border-color: rgba(36, 94, 74, 0.22); }
  .pill.pending { background: var(--warn-soft); color: var(--warn); border-color: rgba(138, 90, 24, 0.22); }
  .pill.fail { background: var(--danger-soft); color: var(--danger); border-color: rgba(140, 45, 45, 0.22); }

  .hero-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-top: 28px;
    position: relative;
    z-index: 1;
  }

  .stat {
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(255, 252, 246, 0.68);
    min-height: 128px;
  }

  .stat-label {
    font: 700 11px/1 var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }

  .stat-value {
    font-family: var(--display);
    font-size: clamp(28px, 5vw, 42px);
    line-height: 0.96;
    letter-spacing: -0.05em;
  }

  .stat-meta {
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .grid {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 18px;
    margin-top: 20px;
  }

  .stack {
    display: grid;
    gap: 18px;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--paper);
    box-shadow: 0 10px 30px rgba(41, 35, 22, 0.04);
    overflow: hidden;
  }

  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
  }

  .panel-title {
    font: 700 14px/1 var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .panel-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .panel-body {
    padding: 18px 20px 20px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .mini {
    padding: 14px;
    border-radius: 18px;
    background: rgba(255, 252, 246, 0.72);
    border: 1px solid var(--line);
  }

  .mini .label {
    font: 700 10px/1 var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .mini .value {
    font-family: var(--display);
    font-size: 28px;
    letter-spacing: -0.05em;
    line-height: 0.95;
  }

  .mini .meta {
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  .meter {
    margin-top: 16px;
  }

  .meter-track {
    height: 14px;
    border-radius: 999px;
    background: rgba(36, 94, 74, 0.08);
    position: relative;
    overflow: hidden;
  }

  .meter-fill {
    position: absolute;
    inset: 0 auto 0 0;
    border-radius: 999px;
    background: linear-gradient(90deg, #20463c, #2a6b56);
  }

  .row-list {
    display: grid;
    gap: 10px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: rgba(255, 252, 246, 0.64);
  }

  .row strong {
    display: block;
    font-size: 14px;
  }

  .row span {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .row .right {
    text-align: right;
    min-width: 120px;
  }

  .kv {
    display: grid;
    gap: 10px;
  }

  .kv-line {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }

  .kv-line:last-child {
    padding-bottom: 0;
    border-bottom: 0;
  }

  .kv-key {
    color: var(--muted);
    font: 700 11px/1 var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .kv-value {
    text-align: right;
    font-size: 13px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    text-align: left;
    padding: 11px 10px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    vertical-align: top;
  }

  th {
    font: 700 11px/1 var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  tr:last-child td { border-bottom: 0; }
  td.r, th.r { text-align: right; }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255, 252, 246, 0.7);
    font: 700 11px/1 var(--mono);
  }

  .tag.pass { color: var(--accent); border-color: rgba(36, 94, 74, 0.18); background: var(--accent-soft); }
  .tag.pending { color: var(--warn); border-color: rgba(138, 90, 24, 0.18); background: var(--warn-soft); }
  .tag.fail { color: var(--danger); border-color: rgba(140, 45, 45, 0.18); background: var(--danger-soft); }

  .empty {
    padding: 20px;
    border-radius: 18px;
    border: 1px dashed var(--line);
    color: var(--muted);
    font-size: 14px;
    background: rgba(255, 252, 246, 0.5);
  }

  .mono { font-family: var(--mono); }

  @media (max-width: 1080px) {
    .hero-top,
    .grid {
      grid-template-columns: 1fr;
      display: grid;
    }
    .hero-strip {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 720px) {
    .shell { padding: 16px 14px 36px; }
    .hero { padding: 20px; border-radius: 22px; }
    .hero-strip,
    .summary-grid {
      grid-template-columns: 1fr;
    }
    .panel,
    .stat,
    .mini { border-radius: 18px; }
    .panel-head,
    .panel-body { padding-left: 16px; padding-right: 16px; }
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5) {
      display: none;
    }
  }
</style>
</head>
<body>
<div class="shell" id="app"></div>

<script>
const REFRESH_MS = 60000;

function fmt(n, digits = 0) {
  if (n == null || Number.isNaN(n)) return '\u2014';
  if (typeof n === 'number') {
    return digits ? n.toLocaleString(undefined, { minimumFractionDigits: digits, maximumFractionDigits: digits }) : n.toLocaleString();
  }
  return String(n);
}

function ago(ts) {
  if (!ts) return '\u2014';
  const seconds = (Date.now() - new Date(ts).getTime()) / 1000;
  if (!Number.isFinite(seconds)) return '\u2014';
  if (seconds < 60) return `${Math.max(0, Math.floor(seconds))}s ago`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
  return `${Math.floor(seconds / 86400)}d ago`;
}

function statusClass(status) {
  if (['approved', 'promote', 'promoted', 'baseline_ready', 'complete'].includes(status)) return 'pass';
  if (['rejected', 'fail'].includes(status)) return 'fail';
  return 'pending';
}

function statusLabel(status) {
  if (!status) return 'pending';
  if (status === 'approved') return 'pass';
  if (status === 'rejected') return 'fail';
  if (status === 'promote') return 'ready';
  if (status === 'baseline_ready') return 'baseline ready';
  return status.replaceAll('_', ' ');
}

function renderHeader(data, focus) {
  const model = data.model || {};
  const approved = data.approved_model || {};
  const decision = (focus && focus.decision) || {};
  const gate = (focus && focus.gate) || {};
  const benchmark = (focus && focus.benchmark) || {};
  const focusVersion = focus ? focus.version : null;

  const headline = focusVersion && focusVersion > (approved.version || 0)
    ? `v${focusVersion} is on trial`
    : approved.version
      ? `v${approved.version} is the current baseline`
      : 'waiting for the first approved model';

  const sub = focusVersion && focusVersion > (approved.version || 0)
    ? `The service is only tracking one decision path: candidate v${focusVersion} against approved v${approved.version}. Gate evidence and anchor regressions below are the promotion record.`
    : 'No newer immutable snapshot is currently ahead of the approved model. The dashboard stays focused on evaluation evidence, not standings.';

  return `
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">Hexchess Evaluation Service</div>
          <h1>${headline}</h1>
          <div class="hero-sub">${sub}</div>
        </div>
        <div class="hero-meta">
          <div class="pill ${statusClass(decision.status)}">${statusLabel(decision.status)}</div>
          <div class="pill">latest v${fmt(model.version)}</div>
          <div class="pill">approved v${fmt(approved.version)}</div>
          <div class="pill">synced ${ago(data.timestamp)}</div>
        </div>
      </div>
      <div class="hero-strip">
        <div class="stat">
          <div class="stat-label">Current Candidate</div>
          <div class="stat-value">${focusVersion && focusVersion > (approved.version || 0) ? `v${focusVersion}` : 'none'}</div>
          <div class="stat-meta">${focusVersion ? `decision ${statusLabel(decision.status)}` : 'no pending candidate above approved'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Gate Record</div>
          <div class="stat-value">${gate.games ? `${gate.wins}-${gate.losses}-${gate.draws}` : '\u2014'}</div>
          <div class="stat-meta">${gate.games ? `score ${fmt(gate.score, 3)} over ${fmt(gate.games)} games` : 'no gate games yet'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Anchor Coverage</div>
          <div class="stat-value">${benchmark.games ? fmt(benchmark.games) : '\u2014'}</div>
          <div class="stat-meta">${benchmark.status ? `${statusLabel(benchmark.status)} across fixed anchors` : 'anchor suite not started'}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Promotion Pointer</div>
          <div class="stat-value">${approved.version ? `v${approved.version}` : '\u2014'}</div>
          <div class="stat-meta">${approved.promoted_at ? `approved ${ago(approved.promoted_at)}` : 'no approved pointer yet'}</div>
        </div>
      </div>
    </section>
  `;
}

function renderGate(focus) {
  const gate = focus && focus.gate;
  if (!gate) {
    return `<section class="panel"><div class="panel-head"><div><div class="panel-title">Gate</div><div class="panel-sub">Direct candidate vs approved evidence</div></div></div><div class="panel-body"><div class="empty">No gate summary for the focused version yet.</div></div></section>`;
  }

  const confidence = gate.confidence || {};
  const sprt = gate.sprt || {};
  const progress = Math.min(100, Math.round(((gate.games || 0) / 100) * 100));
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Gate</div>
          <div class="panel-sub">Candidate ${gate.candidate} vs approved ${gate.approved}</div>
        </div>
        <span class="tag ${statusClass(gate.status)}">${statusLabel(gate.status)}</span>
      </div>
      <div class="panel-body">
        <div class="summary-grid">
          <div class="mini">
            <div class="label">Score</div>
            <div class="value">${fmt(gate.score, 3)}</div>
            <div class="meta">${fmt(gate.wins)} wins, ${fmt(gate.losses)} losses, ${fmt(gate.draws)} draws</div>
          </div>
          <div class="mini">
            <div class="label">Confidence</div>
            <div class="value">\u00b1${fmt(confidence.ci_half_width, 3)}</div>
            <div class="meta">interval ${fmt(confidence.lower, 3)} to ${fmt(confidence.upper, 3)}</div>
          </div>
          <div class="mini">
            <div class="label">SPRT</div>
            <div class="value">${fmt(sprt.llr, 3)}</div>
            <div class="meta">${statusLabel(sprt.status)} against ${fmt(sprt.null_score, 2)} / ${fmt(sprt.alt_score, 2)}</div>
          </div>
        </div>
        <div class="meter">
          <div class="kv-line"><span class="kv-key">Games Collected</span><span class="kv-value">${fmt(gate.games)} / 100</span></div>
          <div class="meter-track"><div class="meter-fill" style="width:${progress}%"></div></div>
        </div>
        <div class="kv" style="margin-top:16px">
          <div class="kv-line"><span class="kv-key">Paired Buckets</span><span class="kv-value mono">${Object.entries(gate.pair_buckets || {}).map(([k, v]) => `${k}:${v}`).join(' ')}</span></div>
          <div class="kv-line"><span class="kv-key">Color Split</span><span class="kv-value">white ${fmt(gate.color_split?.candidate_white?.games || 0)} / black ${fmt(gate.color_split?.candidate_black?.games || 0)}</span></div>
          <div class="kv-line"><span class="kv-key">Move Time</span><span class="kv-value">${fmt(gate.move_time_stats?.candidate_seconds_per_move, 3)}s/move candidate</span></div>
        </div>
      </div>
    </section>
  `;
}

function renderBenchmark(focus) {
  const benchmark = focus && focus.benchmark;
  if (!benchmark) {
    return `<section class="panel"><div class="panel-head"><div><div class="panel-title">Benchmarks</div><div class="panel-sub">Fixed anchors</div></div></div><div class="panel-body"><div class="empty">No benchmark summary for the focused version yet.</div></div></section>`;
  }

  const rows = Object.values(benchmark.per_opponent || {}).map(entry => `
    <tr>
      <td><strong>${entry.opponent}</strong><br><span class="mono">${statusLabel(entry.status)}</span></td>
      <td class="r">${fmt(entry.score, 3)}</td>
      <td class="r">${entry.target_score == null ? '\u2014' : fmt(entry.target_score, 3)}</td>
      <td class="r">${fmt(entry.games)}</td>
      <td class="r">${fmt(entry.confidence?.ci_half_width, 3)}</td>
    </tr>
  `).join('');

  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Benchmarks</div>
          <div class="panel-sub">Candidate vs fixed anchors</div>
        </div>
        <span class="tag ${statusClass(benchmark.status)}">${statusLabel(benchmark.status)}</span>
      </div>
      <div class="panel-body">
        <div class="summary-grid">
          <div class="mini">
            <div class="label">Aggregate Score</div>
            <div class="value">${fmt(benchmark.score, 3)}</div>
            <div class="meta">${fmt(benchmark.games)} total games</div>
          </div>
          <div class="mini">
            <div class="label">Regression Rule</div>
            <div class="value">${benchmark.reference_available ? 'live' : 'seed'}</div>
            <div class="meta">${benchmark.reference_available ? 'candidate must stay within anchor tolerance' : 'collecting baseline anchor fingerprints'}</div>
          </div>
          <div class="mini">
            <div class="label">Termination Mix</div>
            <div class="value">${Object.keys(benchmark.termination_mix || {}).length}</div>
            <div class="meta">${Object.entries(benchmark.termination_mix || {}).map(([k, v]) => `${k}:${v}`).join(' ') || 'no games yet'}</div>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Anchor</th>
              <th class="r">Score</th>
              <th class="r">Floor</th>
              <th class="r">Games</th>
              <th class="r">CI</th>
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="5" class="empty">No anchor data yet.</td></tr>`}</tbody>
        </table>
      </div>
    </section>
  `;
}

function renderDecision(focus) {
  const decision = (focus && focus.decision) || {};
  const reasons = (decision.reasons || []).map(reason => `
    <div class="row">
      <div><strong>${reason}</strong></div>
      <div class="right"><span>${ago(decision.updated_at)}</span></div>
    </div>
  `).join('');

  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Decision</div>
          <div class="panel-sub">Promotion result for the focused version</div>
        </div>
        <span class="tag ${statusClass(decision.status)}">${statusLabel(decision.status)}</span>
      </div>
      <div class="panel-body">
        <div class="kv">
          <div class="kv-line"><span class="kv-key">Candidate</span><span class="kv-value">${decision.candidate || '\u2014'}</span></div>
          <div class="kv-line"><span class="kv-key">Gate</span><span class="kv-value">${statusLabel(decision.gate_status)}</span></div>
          <div class="kv-line"><span class="kv-key">Benchmarks</span><span class="kv-value">${statusLabel(decision.benchmark_status)}</span></div>
          <div class="kv-line"><span class="kv-key">Updated</span><span class="kv-value">${ago(decision.updated_at)}</span></div>
        </div>
        <div class="row-list" style="margin-top:16px">
          ${reasons || '<div class="empty">No decision reasons recorded yet.</div>'}
        </div>
      </div>
    </section>
  `;
}

function renderGames(data) {
  const games = data.recent_games || [];
  if (!games.length) {
    return `<section class="panel"><div class="panel-head"><div><div class="panel-title">Recent Games</div><div class="panel-sub">Immutable evaluation records</div></div></div><div class="panel-body"><div class="empty">No evaluation games have been recorded for the focused version yet.</div></div></section>`;
  }
  const rows = [...games].reverse().map(game => `
    <tr>
      <td><span class="tag ${statusClass(game.eval_type)}">${game.eval_type}</span></td>
      <td>${game.white} vs ${game.black}<br><span class="mono">pair ${game.pair_id || '\u2014'} / game ${game.pair_game_index ?? '\u2014'}</span></td>
      <td class="r">${game.outcome}</td>
      <td class="r">${fmt(game.moves)}</td>
      <td class="r">${ago(game.timestamp)}</td>
    </tr>
  `).join('');
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Recent Games</div>
          <div class="panel-sub">Latest immutable records under the focused evaluation version</div>
        </div>
      </div>
      <div class="panel-body">
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Players</th>
              <th class="r">Outcome</th>
              <th class="r">Moves</th>
              <th class="r">Age</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </section>
  `;
}

function renderVersions(data) {
  const evals = data.evaluations || {};
  const summaries = evals.summaries || {};
  const rows = (evals.versions || []).slice().reverse().map(version => {
    const summary = summaries[`v${version}`] || {};
    const decision = summary.decision || {};
    const gate = summary.gate || {};
    const benchmark = summary.benchmark || {};
    return `
      <div class="row">
        <div>
          <strong>v${version}</strong>
          <span>gate ${statusLabel(gate.status)} · benchmark ${statusLabel(benchmark.status)}</span>
        </div>
        <div class="right">
          <strong>${statusLabel(decision.status)}</strong>
          <span>${ago(decision.updated_at)}</span>
        </div>
      </div>
    `;
  }).join('');
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Version History</div>
          <div class="panel-sub">Latest evaluation artifacts by version</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="row-list">
          ${rows || '<div class="empty">No evaluation summaries found yet.</div>'}
        </div>
      </div>
    </section>
  `;
}

function renderWorkers(data) {
  const workers = Object.entries(data.workers || {});
  const rows = workers.map(([name, info]) => `
    <div class="row">
      <div>
        <strong>${name}</strong>
        <span>model v${fmt(info.model_version)} · ${fmt(info.total_games)} games</span>
      </div>
      <div class="right">
        <strong>${ago(info.timestamp)}</strong>
        <span>${info.hostname || ''}</span>
      </div>
    </div>
  `).join('');

  const selfplay = data.data?.selfplay || {};
  const imitation = data.data?.imitation || {};
  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Throughput</div>
          <div class="panel-sub">Training data and worker liveness</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="summary-grid">
          <div class="mini">
            <div class="label">Self-play</div>
            <div class="value">${fmt(selfplay.total_positions || 0)}</div>
            <div class="meta">${fmt(selfplay.total_files || 0)} files</div>
          </div>
          <div class="mini">
            <div class="label">Imitation</div>
            <div class="value">${fmt(imitation.total_positions || 0)}</div>
            <div class="meta">${fmt(imitation.total_files || 0)} files</div>
          </div>
          <div class="mini">
            <div class="label">Workers</div>
            <div class="value">${fmt(workers.length)}</div>
            <div class="meta">active heartbeats</div>
          </div>
        </div>
        <div class="row-list">
          ${rows || '<div class="empty">No worker heartbeats available.</div>'}
        </div>
      </div>
    </section>
  `;
}

function renderTrainer(data) {
  const summaries = data.trainer_metrics?.summaries || [];
  const rows = summaries.slice(-6).reverse().map(entry => `
    <div class="row">
      <div>
        <strong>summary ${fmt(entry.summary)}</strong>
        <span>v${fmt(entry.version)} · loss_policy ${fmt(entry.loss_policy, 4)}</span>
      </div>
      <div class="right">
        <strong>${fmt(entry.positions_seen || entry.positions || 0)}</strong>
        <span>positions</span>
      </div>
    </div>
  `).join('');

  return `
    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Trainer</div>
          <div class="panel-sub">Most recent trainer summaries</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="row-list">
          ${rows || '<div class="empty">No trainer summaries available yet.</div>'}
        </div>
      </div>
    </section>
  `;
}

function render(data) {
  const focus = data.evaluations?.focus || null;
  document.getElementById('app').innerHTML = `
    ${renderHeader(data, focus)}
    <div class="grid">
      <div class="stack">
        ${renderGate(focus)}
        ${renderBenchmark(focus)}
        ${renderGames(data)}
      </div>
      <div class="stack">
        ${renderDecision(focus)}
        ${renderVersions(data)}
        ${renderWorkers(data)}
        ${renderTrainer(data)}
      </div>
    </div>
  `;
}

async function refresh() {
  const res = await fetch('/api/status', { cache: 'no-store' });
  const data = await res.json();
  render(data);
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
