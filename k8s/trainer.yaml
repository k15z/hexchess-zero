apiVersion: apps/v1
kind: Deployment
metadata:
  name: trainer
  namespace: hexchess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hexchess-trainer
  template:
    metadata:
      labels:
        app: hexchess-trainer
    spec:
      runtimeClassName: nvidia
      containers:
        - name: trainer
          image: ghcr.io/k15z/hexchess-zero/training:cuda
          imagePullPolicy: Always
          args: ["trainer"]
          envFrom:
            - secretRef:
                name: hexchess-env
          resources:
            # GPU training: ~94ms/step vs ~1.1s/step on CPU. Reduced CPU/memory
            # since GPU handles compute; nvidia.com/gpu enables CUDA.
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "4Gi"
              nvidia.com/gpu: "1"
