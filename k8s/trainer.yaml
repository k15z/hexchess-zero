apiVersion: apps/v1
kind: Deployment
metadata:
  name: trainer
  namespace: hexchess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hexchess-trainer
  template:
    metadata:
      labels:
        app: hexchess-trainer
    spec:
      containers:
        - name: trainer
          image: ghcr.io/k15z/hexchess-zero/training:latest
          imagePullPolicy: Always
          args: ["trainer"]
          envFrom:
            - secretRef:
                name: hexchess-env
          resources:
            # Idle usage is ~30m CPU / ~300Mi, but training with batch_size=256
            # spikes significantly. 4 CPU enables PyTorch parallelism; 4Gi avoids
            # OOMKill during bootstrap training (previously OOMed at 1Gi).
            requests:
              cpu: "4"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
