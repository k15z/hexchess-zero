apiVersion: apps/v1
kind: Deployment
metadata:
  name: trainer
  namespace: hexchess
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hexchess-trainer
  template:
    metadata:
      labels:
        app: hexchess-trainer
    spec:
      runtimeClassName: nvidia
      containers:
        - name: trainer
          image: ghcr.io/k15z/hexchess-zero/training:cuda-47e2984
          args: ["trainer"]
          envFrom:
            - secretRef:
                name: hexchess-env
          resources:
            # GPU training: ~94ms/step vs ~1.1s/step on CPU. 8Gi prevents OOMKill
            # (CUDA has additional pinned memory overhead).
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
