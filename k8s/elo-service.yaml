apiVersion: apps/v1
kind: Deployment
metadata:
  name: elo-service
  namespace: hexchess
spec:
  # Each replica plays one game at a time; bump for throughput. Set
  # ELO_SLACK_LEADER=1 on at most one replica if Slack notifications are wanted.
  replicas: 2
  selector:
    matchLabels:
      app: hexchess-elo
  template:
    metadata:
      labels:
        app: hexchess-elo
    spec:
      containers:
        - name: elo
          image: ghcr.io/k15z/hexchess-zero/training:latest
          args: ["elo-service"]
          envFrom:
            - secretRef:
                name: hexchess-env
          env:
            # Single game per replica. 4 threads for MCTS + ONNX intra-op.
            - name: OMP_NUM_THREADS
              value: "4"
            - name: ORT_NUM_THREADS
              value: "4"
            - name: RAYON_NUM_THREADS
              value: "4"
          resources:
            # PLAYER_CACHE_SIZE=6 * ~800MB ONNX sessions ≈ 5 GB resident, but
            # observed to climb past 6 GiB mid-run (21 OOMKills over 11 hrs
            # at 6Gi limit). 8Gi leaves headroom for allocator frag + GC.
            requests:
              cpu: "4"
              memory: "12Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
