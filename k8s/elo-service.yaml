apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexchess-elo-service
  namespace: hexchess
  labels:
    app: hexchess
    role: elo-service
spec:
  replicas: 1
  strategy:
    type: Recreate  # only one instance at a time
  selector:
    matchLabels:
      app: hexchess
      role: elo-service
  template:
    metadata:
      labels:
        app: hexchess
        role: elo-service
    spec:
      terminationGracePeriodSeconds: 300  # allow current game to finish
      containers:
        - name: elo-service
          image: ghcr.io/k15z/hexchess-zero/training:latest
          imagePullPolicy: Always
          args: ["elo-service"]
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-webhook
                  key: webhook-url
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/.data
          resources:
            requests:
              memory: 4Gi
              cpu: "4"
            limits:
              memory: 8Gi
              cpu: "6"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hexchess-data
