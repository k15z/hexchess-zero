apiVersion: apps/v1
kind: Deployment
metadata:
  name: elo-service
  namespace: hexchess
spec:
  # Horizontally scalable: each replica plays one game at a time and writes
  # race-free per-game objects to state/elo_games/. Bump replicas for more
  # throughput — no coordination required. Set ELO_SLACK_LEADER=1 on at most
  # one replica if Slack notifications are desired (use a patch, not this
  # template, or gate it behind a separate Deployment).
  replicas: 4
  selector:
    matchLabels:
      app: hexchess-elo
  template:
    metadata:
      labels:
        app: hexchess-elo
    spec:
      containers:
        - name: elo
          image: ghcr.io/k15z/hexchess-zero/training:latest
          args: ["elo-service"]
          envFrom:
            - secretRef:
                name: hexchess-env
          env:
            # Single game per replica. 4 threads for MCTS + ONNX intra-op.
            - name: OMP_NUM_THREADS
              value: "4"
            - name: ORT_NUM_THREADS
              value: "4"
            - name: RAYON_NUM_THREADS
              value: "4"
          resources:
            # Single in-process game loop; peak memory is PLAYER_CACHE_SIZE
            # (6) * ~800MB ONNX session ≈ 5 GB. 6Gi leaves headroom.
            requests:
              cpu: "4"
              memory: "6Gi"
            limits:
              cpu: "4"
              memory: "6Gi"
