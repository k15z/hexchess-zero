apiVersion: apps/v1
kind: Deployment
metadata:
  name: elo-service
  namespace: hexchess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hexchess-elo
  template:
    metadata:
      labels:
        app: hexchess-elo
    spec:
      containers:
        - name: elo
          image: ghcr.io/k15z/hexchess-zero/training:latest
          args: ["elo-service", "--num-workers", "2"]
          envFrom:
            - secretRef:
                name: hexchess-env
          env:
            # Each game worker uses ~4 CPU for MCTS + ORT intra-op threading.
            # With num_workers=2 that's 8 CPU total, matching the pod request.
            # 3 threads per worker was too few for ONNX to scale — games were 2x slower.
            - name: OMP_NUM_THREADS
              value: "4"
            - name: ORT_NUM_THREADS
              value: "4"
            - name: RAYON_NUM_THREADS
              value: "4"
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
