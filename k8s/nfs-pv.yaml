apiVersion: v1
kind: Namespace
metadata:
  name: hexchess
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: hexchess-nfs
spec:
  capacity:
    storage: 50Gi
  accessModes: [ReadWriteMany]
  nfs:
    server: 10.0.0.2
    path: /srv/hexchess-data
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hexchess-data
  namespace: hexchess
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: hexchess-nfs
  resources:
    requests:
      storage: 50Gi
