apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: hexchess
spec:
  # Each replica plays one paired mini-match at a time; bump for throughput.
  replicas: 2
  selector:
    matchLabels:
      app: hexchess-eval
  template:
    metadata:
      labels:
        app: hexchess-eval
    spec:
      containers:
        - name: evaluation
          image: ghcr.io/k15z/hexchess-zero/training:cpu
          args: ["evaluation-service"]
          envFrom:
            - secretRef:
                name: hexchess-env
          env:
            # Single game per replica. 4 threads for MCTS + ONNX intra-op.
            - name: OMP_NUM_THREADS
              value: "4"
            - name: ORT_NUM_THREADS
              value: "4"
            - name: RAYON_NUM_THREADS
              value: "4"
          resources:
            requests:
              cpu: "4"
              memory: "12Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
