apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: hexchess
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexchess-worker
  template:
    metadata:
      labels:
        app: hexchess-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/k15z/hexchess-zero/training:latest
          args: ["worker"]
          envFrom:
            - secretRef:
                name: hexchess-env
          resources:
            # Self-play workers are ONNX-inference bound. Each worker plays
            # one game at a time with 800 MCTS sims/move. Keep this request
            # in sync with observed sec/move as model size/search settings
            # change over time.
            requests:
              cpu: "7"
              memory: "14Gi"
            limits:
              cpu: "7"
              memory: "14Gi"
