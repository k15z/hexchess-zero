apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: hexchess
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexchess-worker
  template:
    metadata:
      labels:
        app: hexchess-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/k15z/hexchess-zero/training:latest
          args: ["worker"]
          envFrom:
            - secretRef:
                name: hexchess-env
          resources:
            # Self-play workers are ONNX-inference bound. Each worker plays
            # one game at a time with 500 MCTS sims/move. ~7 CPU gives
            # ~2-3s/move, keeping games under 10 min. Scale replicas based
            # on node count (2 workers per 16-core node).
            requests:
              cpu: "7"
              memory: "6Gi"
            limits:
              cpu: "7"
              memory: "6Gi"
