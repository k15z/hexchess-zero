apiVersion: v1
kind: ServiceAccount
metadata:
  name: hexchess-dashboard
  namespace: hexchess
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hexchess-dashboard
  namespace: hexchess
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hexchess-dashboard
  namespace: hexchess
subjects:
  - kind: ServiceAccount
    name: hexchess-dashboard
    namespace: hexchess
roleRef:
  kind: Role
  name: hexchess-dashboard
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexchess-dashboard
  namespace: hexchess
  labels:
    app: hexchess
    role: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hexchess
      role: dashboard
  template:
    metadata:
      labels:
        app: hexchess
        role: dashboard
    spec:
      serviceAccountName: hexchess-dashboard
      containers:
        - name: dashboard
          image: ghcr.io/k15z/hexchess-zero/training:latest
          imagePullPolicy: Always
          args: ["dashboard", "--port", "8080"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /app/.data
              readOnly: true
          resources:
            requests:
              memory: 128Mi
              cpu: "100m"
            limits:
              memory: 256Mi
              cpu: "200m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hexchess-data
---
apiVersion: v1
kind: Service
metadata:
  name: hexchess-dashboard
  namespace: hexchess
spec:
  selector:
    app: hexchess
    role: dashboard
  ports:
    - port: 80
      targetPort: 8080
